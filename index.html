<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Smash Browser - Character Select</title>
    <style>
        body {
            margin: 0; background: #111; color: white;
            font-family: Arial, sans-serif; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #menu {
            position: absolute; background: rgba(20, 20, 20, 0.95);
            width: 800px; height: 500px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #fff; z-index: 10;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .btn {
            background: #ff4500; color: white; border: none;
            padding: 12px 25px; margin: 10px; font-size: 16px;
            cursor: pointer; font-weight: bold; border-radius: 5px;
            width: 250px; transition: 0.2s;
        }
        .btn:hover { background: #ff6347; transform: scale(1.05); }
        .select-container {
            display: flex; gap: 40px; margin-bottom: 20px;
        }
        .select-box {
            background: #222; border: 2px dashed #555; padding: 15px; border-radius: 5px; text-align: center;
        }
        select {
            padding: 8px; font-size: 16px; margin-top: 10px; background: #333; color: white; border: 1px solid #666;
        }
        canvas { background: #222; border: 4px solid #fff; display: none; }
        #ui { display: none; justify-content: space-around; width: 800px; margin-top: 10px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 36px; margin-bottom: 20px; letter-spacing: 2px;">SUPER SMASH BROWSER</h1>
        
        <div class="select-container">
            <div class="select-box">
                <h3>Speler 1</h3>
                <select id="p1Char">
                    <option value="SwordFighter">SwordFighter (Zwaard)</option>
                    <option value="Brawler">Brawler (Vuisten)</option>
                    <option value="Gunner">Gunner (Wapen)</option>
                </select>
            </div>
            <div class="select-box">
                <h3>Speler 2 / CPU</h3>
                <select id="p2Char">
                    <option value="Brawler">Brawler (Vuisten)</option>
                    <option value="SwordFighter">SwordFighter (Zwaard)</option>
                    <option value="Gunner">Gunner (Wapen)</option>
                </select>
            </div>
        </div>

        <button class="btn" id="btnLocal">2 SPELERS (LOKAAL)</button>
        <button class="btn" id="btnCPU">SPELEN VS CPU</button>
        
        <p style="color: #aaa; font-size: 14px; margin-top: 15px;">P1: A-D (Lopen), W (Springen), F (Aanvallen)</p>
        <p style="color: #aaa; font-size: 14px;">P2: Pijltjes (Lopen), Omhoog (Springen), Punt . (Aanvallen)</p>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="ui">
        <div id="p1-ui">Speler 1: 0%</div>
        <div id="p2-ui">Speler 2: 0%</div>
    </div>

    <script>
    window.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gravity = 0.5;

        let gameState = "MENU";
        let isCPUGame = false;
        let projectielen = [];

        const stage = { x: 150, y: 350, width: 500, height: 40 };

        // Stats per klasse
        const classStats = {
            SwordFighter: { color: "#ff3333", damage: 12, range: 45, knockback: 8 },
            Brawler:      { color: "#33ff33", damage: 18, range: 25, knockback: 12 },
            Gunner:       { color: "#3333ff", damage: 7,  range: 0,  knockback: 5 } // Maakt projectielen aan
        };

        class Player {
            constructor(x, y, controls) {
                this.x = x; this.y = y;
                this.width = 40; this.height = 60;
                this.type = "Brawler"; 
                this.color = "#fff";
                this.vx = 0; this.vy = 0;
                this.percentage = 0;
                this.isGrounded = false;
                this.controls = controls;
                this.facing = 1; 
            }

            // Methode om de gekozen klasse in te stellen
            setClass(type) {
                this.type = type;
                this.color = classStats[type].color;
            }

            update() {
                this.vy += gravity;
                this.x += this.vx;
                this.y += this.vy;

                if (this.vx > 0.1) this.facing = 1;
                if (this.vx < -0.1) this.facing = -1;

                this.vx *= this.isGrounded ? 0.8 : 0.95;

                // Stage Collision
                if (this.x + this.width > stage.x && this.x < stage.x + stage.width &&
                    this.y + this.height <= stage.y + 10 && this.y + this.height + this.vy >= stage.y) {
                    this.y = stage.y - this.height; this.vy = 0; this.isGrounded = true;
                } else { this.isGrounded = false; }

                // Blast zones (Doodgaan)
                if (this.y > canvas.height || this.x < 0 || this.x > canvas.width) {
                    this.x = canvas.width / 2; this.y = 100; this.vx = 0; this.vy = 0; this.percentage = 0;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Richtingaanwijzer (wapen/vizier)
                ctx.fillStyle = "white";
                ctx.fillRect(this.facing === 1 ? this.x + this.width - 8 : this.x + 3, this.y + 15, 5, 5);
            }

            jump() { if (this.isGrounded) this.vy = -12; }

            attack(opponent) {
                const stats = classStats[this.type];

                if (this.type === "Gunner") {
                    // Gunner schiet een kogel
                    projectielen.push({
                        x: this.facing === 1 ? this.x + this.width : this.x - 15,
                        y: this.y + 25,
                        vx: this.facing * 10,
                        damage: stats.damage,
                        knockback: stats.knockback,
                        owner: this
                    });
                } else {
                    // SwordFighter en Brawler gebruiken fysieke hitboxes
                    let hitzoneX = this.facing === 1 ? this.x + this.width : this.x - stats.range;
                    if (hitzoneX < opponent.x + opponent.width && hitzoneX + stats.range > opponent.x &&
                        this.y < opponent.y + opponent.height && this.y + this.height > opponent.y) {
                        
                        opponent.percentage += stats.damage;
                        let finalKnockback = stats.knockback + (opponent.percentage * 0.12);
                        opponent.vx = this.facing * finalKnockback;
                        opponent.vy = -3 - (opponent.percentage * 0.08);
                    }
                }
            }
        }

        // Spelers initialiseren (zonder klasse, die zetten we bij de start)
        const p1 = new Player(250, 200, { left: "KeyA", right: "KeyD", up: "KeyW", attack: "KeyF" });
        const p2 = new Player(500, 200, { left: "ArrowLeft", right: "ArrowRight", up: "ArrowUp", attack: "Period" });

        // Toetsenbord inputs
        const keys = {};
        window.addEventListener("keydown", (e) => { keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        function handleInput() {
            // Speler 1 (A, D, W, F)
            if (keys[p1.controls.left]) p1.vx = -5;
            if (keys[p1.controls.right]) p1.vx = 5;
            if (keys[p1.controls.up]) p1.jump();
            if (keys[p1.controls.attack]) { p1.attack(p2); keys[p1.controls.attack] = false; }

            // Speler 2 (Alleen als het GEEN CPU game is)
            if (!isCPUGame) {
                if (keys[p2.controls.left]) p2.vx = -5;
                if (keys[p2.controls.right]) p2.vx = 5;
                if (keys[p2.controls.up]) p2.jump();
                if (keys[p2.controls.attack]) { p2.attack(p1); keys[p2.controls.attack] = false; }
            }
        }

        function updateCPU() {
            if (!isCPUGame) return;

            // Loop naar P1 toe
            if (p2.x < p1.x - 40) p2.vx = 2.5;
            else if (p2.x > p1.x + 40) p2.vx = -2.5;

            // Spring willekeurig als P1 hoger is
            if (p1.y < p2.y - 40 && Math.random() < 0.03) p2.jump();

            // Val aan op basis van klasse-bereik
            let attackRange = p2.type === "Gunner" ? 250 : 60;
            if (Math.abs(p2.x - p1.x) < attackRange && Math.random() < 0.05) {
                p2.attack(p1);
            }
        }

        function updateProjectiles() {
            for (let i = projectielen.length - 1; i >= 0; i--) {
                let proj = projectielen[i];
                proj.x += proj.vx;

                // Teken de kogel
                ctx.fillStyle = "yellow";
                ctx.fillRect(proj.x, proj.y, 15, 8);

                let target = (proj.owner === p1) ? p2 : p1;
                
                // Check of de kogel de tegenstander raakt
                if (proj.x > target.x && proj.x < target.x + target.width && 
                    proj.y > target.y && proj.y < target.y + target.height) {
                    
                    target.percentage += proj.damage;
                    let kb = proj.knockback + (target.percentage * 0.1);
                    target.vx = (proj.vx > 0 ? 1 : -1) * kb;
                    target.vy = -3;
                    
                    projectielen.splice(i, 1);
                    continue;
                }

                // Kogel verwijderen buiten beeld
                if (proj.x < 0 || proj.x > canvas.width) {
                    projectielen.splice(i, 1);
                }
            }
        }

        function startScherm(vsCPU) {
            isCPUGame = vsCPU;
            gameState = "PLAYING";
            
            // Haal de gekozen klasses op uit de menu dropdowns
            p1.setClass(document.getElementById("p1Char").value);
            p2.setClass(document.getElementById("p2Char").value);

            // Schakel UI om
            document.getElementById("menu").style.display = "none";
            canvas.style.display = "block";
            document.getElementById("ui").style.display = "flex";
            
            gameLoop();
        }

        function gameLoop() {
            if (gameState !== "PLAYING") return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            handleInput();
            updateCPU();

            p1.update();
            p2.update();

            // Teken de Stage (Platform)
            ctx.fillStyle = "#666";
            ctx.fillRect(stage.x, stage.y, stage.width, stage.height);

            p1.draw();
            p2.draw();
            updateProjectiles();

            // UI percentages en klassenaam updaten
            document.getElementById("p1-ui").innerText = `Speler 1 (${p1.type}): ${p1.percentage}%`;
            document.getElementById("p2-ui").innerText = `${isCPUGame ? 'CPU' : 'Speler 2'} (${p2.type}): ${p2.percentage}%`;

            requestAnimationFrame(gameLoop);
        }

        // Knoppen activeren via JavaScript Event Listeners
        document.getElementById("btnLocal").addEventListener("click", () => startScherm(false));
        document.getElementById("btnCPU").addEventListener("click", () => startScherm(true));
    });
    </script>
</body>
</html>
