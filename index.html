<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Smash Browser - Victory Screen Edition</title>
    <style>
        body {
            margin: 0; background: #111; color: white;
            font-family: 'Segoe UI', Arial, sans-serif; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #menu, #victoryScreen {
            position: absolute; background: rgba(15, 15, 25, 0.98);
            width: 800px; height: 500px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #ffaa00; z-index: 10;
            box-shadow: 0 0 40px rgba(255, 170, 0, 0.3);
            border-radius: 10px;
        }
        #victoryScreen {
            display: none; background: rgba(10, 10, 15, 0.95); border-color: #00ffcc;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.3);
        }
        .btn {
            background: linear-gradient(135deg, #ffaa00, #ff5500); color: white; border: none;
            padding: 15px 30px; margin: 10px; font-size: 18px;
            cursor: pointer; font-weight: bold; border-radius: 5px;
            width: 300px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-victory {
            background: linear-gradient(135deg, #00ffcc, #0099ff);
        }
        .select-container { display: flex; gap: 40px; margin-bottom: 30px; }
        .select-box {
            background: #1a1a24; border: 2px solid #333; padding: 20px; border-radius: 8px; text-align: center;
        }
        select {
            padding: 10px; font-size: 16px; margin-top: 12px; background: #222; color: white; border: 1px solid #555;
            border-radius: 4px; cursor: pointer;
        }
        canvas { background: linear-gradient(to bottom, #151624, #0a0b12); border: 4px solid #333; border-radius: 6px; display: none; }
        #ui { display: none; justify-content: space-around; width: 800px; margin-top: 15px; font-size: 26px; font-weight: bold; }
        .p-ui-box { padding: 10px 20px; border-radius: 8px; background: rgba(0,0,0,0.4); min-width: 250px; text-align: center; transition: 0.1s; }
        .final-smash-ready { animation: glow 0.5s infinite alternate; border-color: #ffaa00 !important; }
        @keyframes glow { from { box-shadow: 0 0 10px #ffaa00; } to { box-shadow: 0 0 25px #ff5500; } }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 40px; margin-bottom: 5px; color: #ffaa00; text-shadow: 0 0 10px rgba(255,170,0,0.5);">SUPER SMASH BROWSER</h1>
        <p style="color: #666; margin-bottom: 25px;">Final Smash & Victory Screen Edition</p>
        
        <div class="select-container">
            <div class="select-box" style="border-top: 4px solid #ff3333;">
                <h3>Speler 1</h3>
                <select id="p1Char">
                    <option value="Brawler">Brawler 🥊</option>
                    <option value="SwordFighter">SwordFighter ⚔️</option>
                    <option value="Gunner">Gunner 🔫</option>
                </select>
            </div>
            <div class="select-box" style="border-top: 4px solid #3333ff;">
                <h3>Speler 2 / CPU</h3>
                <select id="p2Char">
                    <option value="SwordFighter">SwordFighter ⚔️</option>
                    <option value="Brawler">Brawler 🥊</option>
                    <option value="Gunner">Gunner 🔫</option>
                </select>
            </div>
        </div>

        <button class="btn" id="btnLocal">2 SPELERS (LOKAAL)</button>
        <button class="btn" id="btnCPU">SPELEN VS CPU</button>
    </div>

    <div id="victoryScreen">
        <h1 id="victoryTitle" style="font-size: 50px; color: #00ffcc; text-shadow: 0 0 20px rgba(0,255,204,0.6); margin-bottom: 10px;">VICTORY!</h1>
        <p id="victorySub" style="font-size: 20px; color: #aaa; margin-bottom: 30px;">Speler 1 wint de match!</p>
        <button class="btn btn-victory" id="btnBackToMenu">TERUG NAAR MENU</button>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="ui">
        <div id="p1-ui" class="p-ui-box" style="border-bottom: 4px solid #ff3333;">Speler 1: 0%</div>
        <div id="p2-ui" class="p-ui-box" style="border-bottom: 4px solid #3333ff;">Speler 2: 0%</div>
    </div>

    <script>
    window.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gravity = 0.5;

        let gameState = "MENU";
        let isCPUGame = false;
        let projectielen = [];

        const stage = { x: 150, y: 350, width: 500, height: 30 };

        const classStats = {
            SwordFighter: { color: "#ff5555", weaponColor: "#e0e0e0", damage: 14, range: 55, knockback: 7 },
            Brawler:      { color: "#55ff55", weaponColor: "#ff0000", damage: 19, range: 40, knockback: 9 },
            Gunner:       { color: "#5555ff", weaponColor: "#777777", damage: 6,  range: 0,  knockback: 4 }
        };

        class Player {
            constructor(x, y, controls) {
                this.startX = x; this.startY = y; // Sla startposities op voor resets
                this.x = x; this.y = y;
                this.width = 40; this.height = 60;
                this.type = "Brawler"; 
                this.color = "#fff";
                this.vx = 0; this.vy = 0;
                this.percentage = 0;
                this.isGrounded = false;
                this.controls = controls;
                this.facing = 1; 
                
                this.attackTimer = 0;
                this.animFrame = 0;
                this.isFinalSmashing = false; 
            }

            setClass(type) {
                this.type = type;
                this.color = classStats[type].color;
            }

            reset() {
                this.x = this.startX; this.y = this.startY;
                this.vx = 0; this.vy = 0;
                this.percentage = 0;
                this.isFinalSmashing = false;
                this.attackTimer = 0;
            }

            update() {
                this.vy += gravity;
                this.x += this.vx;
                this.y += this.vy;

                if (this.vx > 0.1) this.facing = 1;
                if (this.vx < -0.1) this.facing = -1;

                this.vx *= this.isGrounded ? 0.8 : 0.95;

                if (Math.abs(this.vx) > 0.2 && this.isGrounded) this.animFrame += 0.2;

                if (this.attackTimer > 0) {
                    this.attackTimer--;
                    if (this.attackTimer === 0) this.isFinalSmashing = false; 
                }

                // Stage Collision
                if (this.x + this.width > stage.x && this.x < stage.x + stage.width &&
                    this.y + this.height <= stage.y + 10 && this.y + this.height + this.vy >= stage.y) {
                    this.y = stage.y - this.height; this.vy = 0; this.isGrounded = true;
                } else { this.isGrounded = false; }
            }

            draw() {
                let centerX = this.x + this.width / 2;
                let centerY = this.y + this.height / 2;
                let weaponColor = classStats[this.type].weaponColor;

                if (this.isFinalSmashing) {
                    ctx.save();
                    ctx.shadowBlur = 35;
                    ctx.shadowColor = "#ffaa00";
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.scale(this.facing, 1);

                // BENEN
                let legSwing = Math.sin(this.animFrame) * 10;
                ctx.fillStyle = "#222";
                if (!this.isGrounded) legSwing = 8;
                ctx.fillRect(-12, 15, 8, 15 + legSwing * 0.3); 
                ctx.fillRect(4, 15, 8, 15 - legSwing * 0.3);

                // LICHAAM
                ctx.fillStyle = this.color;
                ctx.fillRect(-15, -15, 30, 32);

                // HOOFD
                ctx.fillStyle = "#ffdbac";
                ctx.fillRect(-10, -33, 20, 18);
                ctx.fillStyle = "#000";
                ctx.fillRect(4, -28, 3, 4);

                // WAPEN ANIMATIE
                let ext = 0;
                let sizeMultiplier = this.isFinalSmashing ? 2.2 : 1.0; 

                if (this.attackTimer > 0) {
                    ext = Math.sin((this.attackTimer / 15) * Math.PI) * (25 * sizeMultiplier);
                }

                if (this.type === "Brawler") {
                    ctx.fillStyle = this.isFinalSmashing ? "#ffaa00" : weaponColor;
                    ctx.fillRect(5, -8, (12 + ext), 10 * sizeMultiplier);
                    ctx.beginPath();
                    ctx.arc(17 + ext, -3, 8 * sizeMultiplier, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (this.type === "SwordFighter") {
                    ctx.save();
                    ctx.translate(8, -2);
                    if (this.attackTimer > 0) {
                        ctx.rotate((ext / (25 * sizeMultiplier)) * Math.PI / 2 - Math.PI/4);
                    } else {
                        ctx.rotate(-Math.PI / 4);
                    }
                    ctx.fillStyle = "#555";
                    ctx.fillRect(0, -2, 6, 4);
                    ctx.fillStyle = this.isFinalSmashing ? "#ffaa00" : weaponColor;
                    ctx.fillRect(6, -3, 32 * sizeMultiplier, 6 * sizeMultiplier);
                    ctx.restore();
                } 
                else if (this.type === "Gunner") {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(2, -7, 15, 10);
                    ctx.fillStyle = this.isFinalSmashing ? "#ffaa00" : weaponColor;
                    ctx.fillRect(14, -9, 14 + (ext * 0.2), 14 * sizeMultiplier);
                    ctx.fillStyle = "cyan";
                    ctx.fillRect(26 + (ext * 0.2), -6, 3, 8 * sizeMultiplier);
                }

                ctx.restore();
                if (this.isFinalSmashing) ctx.restore(); 
            }

            jump() { if (this.isGrounded) this.vy = -12; }

            attack(opponent) {
                if (this.attackTimer > 0 || gameState !== "PLAYING") return; 
                
                this.attackTimer = 15; 
                let currentKnockback = classStats[this.type].knockback;
                let currentDamage = classStats[this.type].damage;
                let currentRange = classStats[this.type].range;

                if (this.percentage >= 100 && this.percentage <= 230) {
                    if (Math.random() < 0.30) { 
                        this.isFinalSmashing = true;
                        currentDamage *= 2.2;
                        currentKnockback *= 2.5;
                        currentRange += 30; 
                    }
                }

                if (this.type === "Gunner") {
                    projectielen.push({
                        x: this.facing === 1 ? this.x + this.width + 10 : this.x - 25,
                        y: this.isFinalSmashing ? this.y : this.y + 20,
                        vx: this.facing * (this.isFinalSmashing ? 13 : 10),
                        damage: currentDamage,
                        knockback: currentKnockback,
                        isMega: this.isFinalSmashing,
                        owner: this
                    });
                } else {
                    let hitzoneX = this.facing === 1 ? this.x + this.width : this.x - currentRange;
                    
                    if (hitzoneX < opponent.x + opponent.width && hitzoneX + currentRange > opponent.x &&
                        this.y < opponent.y + opponent.height && this.y + this.height > opponent.y) {
                        
                        opponent.percentage += currentDamage;
                        let calculatedKb = currentKnockback + (opponent.percentage * 0.15);
                        
                        opponent.vx = this.facing * calculatedKb;
                        opponent.vy = -4 - (opponent.percentage * 0.08);
                        
                        if (this.isFinalSmashing) flashScreen(); 
                    }
                }
            }
        }

        const p1 = new Player(250, 200, { left: "KeyA", right: "KeyD", up: "KeyW", attack: "KeyF" });
        const p2 = new Player(500, 200, { left: "ArrowLeft", right: "ArrowRight", up: "ArrowUp", attack: "Period" });

        const keys = {};
        window.addEventListener("keydown", (e) => { keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        let screenFlashTimer = 0;
        function flashScreen() { screenFlashTimer = 6; } 

        function handleInput() {
            if (gameState !== "PLAYING") return;
            if (keys[p1.controls.left]) p1.vx = -5;
            if (keys[p1.controls.right]) p1.vx = 5;
            if (keys[p1.controls.up]) p1.jump();
            if (keys[p1.controls.attack]) { p1.attack(p2); keys[p1.controls.attack] = false; }

            if (!isCPUGame) {
                if (keys[p2.controls.left]) p2.vx = -5;
                if (keys[p2.controls.right]) p2.vx = 5;
                if (keys[p2.controls.up]) p2.jump();
                if (keys[p2.controls.attack]) { p2.attack(p1); keys[p2.controls.attack] = false; }
            }
        }

        function updateCPU() {
            if (!isCPUGame || gameState !== "PLAYING") return;

            if (p2.x < p1.x - 30) p2.vx = 2.5;
            else if (p2.x > p1.x + 30) p2.vx = -2.5;

            if (p1.y < p2.y - 40 && Math.random() < 0.03) p2.jump();

            let attackRange = p2.type === "Gunner" ? 300 : 55;
            if (Math.abs(p2.x - p1.x) < attackRange && Math.random() < 0.04) {
                p2.attack(p1);
            }
        }

        function updateProjectiles() {
            for (let i = projectielen.length - 1; i >= 0; i--) {
                let proj = projectielen[i];
                proj.x += proj.vx;

                let pSize = proj.isMega ? 30 : 6;
                ctx.fillStyle = proj.isMega ? "#ffaa00" : "cyan";
                ctx.fillRect(proj.x, proj.y, proj.isMega ? 60 : 16, pSize);

                let target = (proj.owner === p1) ? p2 : p1;
                
                if (proj.x > target.x && proj.x < target.x + target.width && 
                    proj.y > target.y && proj.y < target.y + target.height + (proj.isMega ? 20 : 0)) {
                    
                    target.percentage += proj.damage;
                    let kb = proj.knockback + (target.percentage * 0.12);
                    target.vx = (proj.vx > 0 ? 1 : -1) * kb;
                    target.vy = proj.isMega ? -6 : -3.5;
                    
                    if (proj.isMega) flashScreen();
                    
                    projectielen.splice(i, 1);
                    continue;
                }

                if (proj.x < -100 || proj.x > canvas.width + 100) {
                    projectielen.splice(i, 1);
                }
            }
        }

        // --- NEW: CHECK VOOR RING OUTS & TOON VICTORY SCHERM ---
        function checkGameOver() {
            let p1Dead = (p1.y > canvas.height || p1.x < 0 || p1.x > canvas.width);
            let p2Dead = (p2.y > canvas.height || p2.x < 0 || p2.x > canvas.width);

            if (p1Dead || p2Dead) {
                gameState = "GAMEOVER";
                projectielen = [];

                let title = document.getElementById("victoryTitle");
                let sub = document.getElementById("victorySub");

                if (p1Dead) {
                    title.innerText = isCPUGame ? "GAME OVER" : "VICTORY!";
                    title.style.color = isCPUGame ? "#ff3333" : "#00ffcc";
                    sub.innerText = isCPUGame ? `De CPU (${p2.type}) heeft gewonnen!` : `Speler 2 (${p2.type}) wint de match!`;
                } else if (p2Dead) {
                    title.innerText = "VICTORY!";
                    title.style.color = "#00ffcc";
                    sub.innerText = `Speler 1 (${p1.type}) wint de match!`;
                }

                // Toon het overwinningsscherm overlay
                document.getElementById("victoryScreen").style.display = "flex";
            }
        }

        function startScherm(vsCPU) {
            isCPUGame = vsCPU;
            gameState = "PLAYING";
            
            p1.reset();
            p2.reset();

            p1.setClass(document.getElementById("p1Char").value);
            p2.setClass(document.getElementById("p2Char").value);

            document.getElementById("menu").style.display = "none";
            document.getElementById("victoryScreen").style.display = "none";
            canvas.style.display = "block";
            document.getElementById("ui").style.display = "flex";
            
            gameLoop();
        }

        function backToMenu() {
            gameState = "MENU";
            document.getElementById("victoryScreen").style.display = "none";
            canvas.style.display = "none";
            document.getElementById("ui").style.display = "none";
            document.getElementById("menu").style.display = "flex";
        }

        function gameLoop() {
            if (gameState !== "PLAYING") return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            handleInput();
            updateCPU();

            p1.update();
            p2.update();
            
            // Check na het verplaatsen of er iemand dood is gegaan
            checkGameOver();

            // Grid
            ctx.strokeStyle = "rgba(255,255,255,0.02)";
            for(let i=0; i<canvas.width; i+=40) { ctx.strokeRect(i, 0, 40, canvas.height); }

            // Stage 
            ctx.fillStyle = "#333";
            ctx.fillRect(stage.x, stage.y, stage.width, stage.height);
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(stage.x, stage.y, stage.width, 4); 

            p1.draw();
            p2.draw();
            updateProjectiles();

            if (screenFlashTimer > 0) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                screenFlashTimer--;
            }

            let p1UI = document.getElementById("p1-ui");
            let p2UI = document.getElementById("p2-ui");

            p1UI.style.color = classStats[p1.type].color;
            p1UI.innerText = `P1 (${p1.type}): ${p1.percentage}%`;
            if (p1.percentage >= 100 && p1.percentage <= 230) p1UI.classList.add("final-smash-ready");
            else p1UI.classList.remove("final-smash-ready");
            
            p2UI.style.color = classStats[p2.type].color;
            p2UI.innerText = `${isCPUGame ? 'CPU' : 'P2'} (${p2.type}): ${p2.percentage}%`;
            if (p2.percentage >= 100 && p2.percentage <= 230) p2UI.classList.add("final-smash-ready");
            else p2UI.classList.remove("final-smash-ready");

            requestAnimationFrame(gameLoop);
        }

        document.getElementById("btnLocal").addEventListener("click", () => startScherm(false));
        document.getElementById("btnCPU").addEventListener("click", () => startScherm(true));
        document.getElementById("btnBackToMenu").addEventListener("click", backToMenu);
    });
    </script>
</body>
</html>
