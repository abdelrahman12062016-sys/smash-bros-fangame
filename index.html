<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smash Bros HTML5 Prototype</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background: #222;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        #ui {
            display: flex;
            justify-content: space-around;
            width: 800px;
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Smash Prototype</h1>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div id="ui">
        <div id="p1-ui">Speler 1: 0%</div>
        <div id="p2-ui">Speler 2: 0%</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
