<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Smash Browser - Ultimate Edition</title>
    <style>
        body {
            margin: 0; background: #05050d; color: white;
            font-family: 'Segoe UI', Arial, sans-serif; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #menu, #victoryScreen {
            position: absolute; background: rgba(10, 10, 20, 0.98);
            width: 800px; height: 500px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #ff9900; z-index: 10;
            box-shadow: 0 0 40px rgba(255, 153, 0, 0.3);
            border-radius: 12px;
        }
        #victoryScreen {
            display: none; background: rgba(5, 5, 10, 0.96); border-color: #00ffcc;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.4);
        }
        .btn {
            background: linear-gradient(135deg, #ff9900, #ff4500); color: white; border: none;
            padding: 12px 25px; margin: 8px; font-size: 18px;
            cursor: pointer; font-weight: bold; border-radius: 6px;
            width: 300px; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-victory { background: linear-gradient(135deg, #00ffcc, #0099ff); }
        .select-container { display: flex; gap: 25px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .select-box {
            background: #131324; border: 2px solid #2a2a40; padding: 15px; border-radius: 8px; text-align: center; min-width: 180px;
        }
        select {
            padding: 8px; font-size: 15px; margin-top: 10px; background: #222; color: white; border: 1px solid #555;
            border-radius: 4px; cursor: pointer; width: 100%;
        }
        canvas { background: #000; border: 4px solid #222; border-radius: 8px; display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        #ui { display: none; justify-content: space-around; width: 800px; margin-top: 15px; font-size: 22px; font-weight: bold; }
        .p-ui-box { padding: 10px 20px; border-radius: 8px; background: rgba(0,0,0,0.5); min-width: 280px; text-align: center; }
        .stocks { color: #ffaa00; font-size: 18px; margin-top: 4px; }
        .final-smash-ready { animation: glow 0.5s infinite alternate; border-color: #ffaa00 !important; }
        @keyframes glow { from { box-shadow: 0 0 10px #ffaa00; } to { box-shadow: 0 0 25px #ff4500; } }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 38px; margin-bottom: 5px; color: #ff9900; text-shadow: 0 0 15px rgba(255,153,0,0.4);">SUPER SMASH BROWSER</h1>
        <p style="color: #555577; margin-bottom: 20px; font-weight: bold; font-size: 14px;">STOCKS • STAGES • SPECIALS</p>
        
        <div class="select-container">
            <div class="select-box" style="border-top: 4px solid #ff4444;">
                <h3>Speler 1</h3>
                <select id="p1Char">
                    <option value="Brawler">Brawler 🥊</option>
                    <option value="SwordFighter">SwordFighter ⚔️</option>
                    <option value="Gunner">Gunner 🔫</option>
                </select>
            </div>
            <div class="select-box" style="border-top: 4px solid #4444ff;">
                <h3>Speler 2 / CPU</h3>
                <select id="p2Char">
                    <option value="SwordFighter">SwordFighter ⚔️</option>
                    <option value="Brawler">Brawler 🥊</option>
                    <option value="Gunner">Gunner 🔫</option>
                </select>
            </div>
            <div class="select-box" style="border-top: 4px solid #00ffcc;">
                <h3>Kies Stage</h3>
                <select id="stageSelect">
                    <option value="Battlefield">Battlefield (Met Platformen)</option>
                    <option value="FinalDestination">Final Destination (Vlak)</option>
                    <option value="ThePit">The Pit (Smal & Gevaarlijk)</option>
                </select>
            </div>
        </div>

        <button class="btn" id="btnLocal">2 SPELERS (LOKAAL)</button>
        <button class="btn" id="btnCPU">SPELEN VS CPU</button>
        
        <p style="color: #666; font-size: 11px; margin-top: 15px;">P1: A-D (Lopen), W (Springen), F (Aanval), G (Special)</p>
        <p style="color: #666; font-size: 11px;">P2: ◄ ► (Lopen), ▲ (Springen), . (Aanval), / (Special)</p>
    </div>

    <div id="victoryScreen">
        <h1 id="victoryTitle" style="font-size: 50px; color: #00ffcc; text-shadow: 0 0 20px rgba(0,255,204,0.5); margin-bottom: 10px;">VICTORY!</h1>
        <p id="victorySub" style="font-size: 20px; color: #8a8a9e; margin-bottom: 30px;">Speler 1 wint de match!</p>
        <button class="btn btn-victory" id="btnBackToMenu">TERUG NAAR MENU</button>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="ui">
        <div id="p1-ui" class="p-ui-box" style="border-bottom: 4px solid #ff4444;">P1: 0% <div class="stocks">⭐⭐⭐</div></div>
        <div id="p2-ui" class="p-ui-box" style="border-bottom: 4px solid #4444ff;">P2: 0% <div class="stocks">⭐⭐⭐</div></div>
    </div>

    <script>
    window.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gravity = 0.5;

        let gameState = "MENU";
        let isCPUGame = false;
        let projectielen = [];
        let lasers = []; 
        let cameraOffset = 0;
        let screenFlashTimer = 0;

        // Stage definities
        let activeStageName = "Battlefield";
        let mainStage = { x: 150, y: 340, width: 500, height: 25, depth: 35 };
        let softPlatforms = []; // Kleine platformpjes waar je doorheen kunt springen/vallen

        const classStats = {
            SwordFighter: { color: "#ff5555", weaponColor: "#e0e0e0", damage: 13, range: 55, knockback: 6.5 },
            Brawler:      { color: "#55ff55", weaponColor: "#ff0000", damage: 17, range: 40, knockback: 8.5 },
            Gunner:       { color: "#5555ff", weaponColor: "#777777", damage: 5,  range: 0,  knockback: 4 }
        };

        class Player {
            constructor(x, y, controls, isP1) {
                this.startX = x; this.startY = y;
                this.x = x; this.y = y;
                this.width = 40; this.height = 60;
                this.type = "Brawler"; 
                this.color = "#fff";
                this.vx = 0; this.vy = 0;
                this.percentage = 0;
                this.stocks = 3;
                this.isGrounded = false;
                this.controls = controls;
                this.facing = isP1 ? 1 : -1; 
                this.isP1 = isP1;
                
                this.attackTimer = 0;
                this.specialTimer = 0;
                this.animFrame = 0;
                this.isFinalSmashing = false; 
                this.respawnTimer = 0;
            }

            setClass(type) {
                this.type = type;
                this.color = classStats[type].color;
            }

            resetFull() {
                this.x = this.startX; this.y = this.startY;
                this.vx = 0; this.vy = 0;
                this.percentage = 0;
                this.stocks = 3;
                this.isFinalSmashing = false;
                this.attackTimer = 0;
                this.specialTimer = 0;
                this.respawnTimer = 0;
            }

            respawn() {
                this.stocks--;
                this.x = this.isP1 ? 250 : 550;
                this.y = 100;
                this.vx = 0; this.vy = 0;
                this.percentage = 0;
                this.respawnTimer = 60; // Knippert 60 frames (invincible)
            }

            update() {
                if (this.respawnTimer > 0) this.respawnTimer--;

                this.vy += gravity;
                this.x += this.vx;
                this.y += this.vy;

                if (this.vx > 0.1) this.facing = 1;
                if (this.vx < -0.1) this.facing = -1;

                this.vx *= this.isGrounded ? 0.8 : 0.95;

                if (Math.abs(this.vx) > 0.2 && this.isGrounded) this.animFrame += 0.2;

                if (this.attackTimer > 0) {
                    this.attackTimer--;
                    if (this.attackTimer === 0) this.isFinalSmashing = false; 
                }
                if (this.specialTimer > 0) {
                    this.specialTimer--;
                    // Special aanval specifieke physics
                    if (this.type === "SwordFighter" && this.specialTimer > 5) {
                        this.vx = this.facing * 6; // Spin attack verplaatst je snel naar voren
                    }
                }

                // --- COLLISION HOOFDPLATFORM ---
                if (this.x + this.width > mainStage.x && this.x < mainStage.x + mainStage.width &&
                    this.y + this.height <= mainStage.y + 10 && this.y + this.height + this.vy >= mainStage.y) {
                    this.y = mainStage.y - this.height; this.vy = 0; this.isGrounded = true;
                } else { 
                    this.isGrounded = false; 
                }

                // --- COLLISION SOFT PLATFORMS ---
                if (!this.isGrounded && this.vy >= 0) {
                    for (let plat of softPlatforms) {
                        if (this.x + this.width > plat.x && this.x < plat.x + plat.width &&
                            this.y + this.height <= plat.y + 8 && this.y + this.height + this.vy >= plat.y) {
                            this.y = plat.y - this.height; this.vy = 0; this.isGrounded = true;
                            break;
                        }
                    }
                }
            }

            drawShadow() {
                if (this.respawnTimer % 4 >= 2) return;
                // Schaduw op hoofdpodium
                if (this.x + this.width > mainStage.x && this.x < mainStage.x + mainStage.width && this.y <= mainStage.y) {
                    let distance = mainStage.y - (this.y + this.height);
                    let shadowWidth = Math.max(8, this.width - (distance * 0.08));
                    let shadowAlpha = Math.max(0, 0.35 - (distance * 0.002));
                    ctx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`;
                    ctx.beginPath();
                    ctx.ellipse(this.x + this.width/2, mainStage.y, shadowWidth, 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            draw() {
                if (this.respawnTimer % 4 >= 2) return; // Knipper effect bij respawn

                let centerX = this.x + this.width / 2;
                let centerY = this.y + this.height / 2;
                let weaponColor = classStats[this.type].weaponColor;

                if (this.isFinalSmashing || (this.specialTimer > 0 && this.type === "Gunner")) {
                    ctx.save();
                    ctx.shadowBlur = 35;
                    ctx.shadowColor = this.isFinalSmashing ? "#ffaa00" : "cyan";
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.scale(this.facing, 1);

                // BENEN
                let legSwing = Math.sin(this.animFrame) * 10;
                ctx.fillStyle = "#151525";
                if (!this.isGrounded) legSwing = 8;
                ctx.fillRect(-12, 15, 8, 15 + legSwing * 0.3); 
                ctx.fillRect(4, 15, 8, 15 - legSwing * 0.3);

                // LICHAAM
                ctx.fillStyle = this.color;
                ctx.fillRect(-15, -15, 30, 32);

                // HOOFD
                ctx.fillStyle = "#ffdbac";
                ctx.fillRect(-10, -33, 20, 18);
                ctx.fillStyle = "#000";
                ctx.fillRect(4, -28, 3, 4);

                // WAPEN EN SPECIAL ANIMATIES
                let ext = 0;
                let sizeMultiplier = this.isFinalSmashing ? 2.2 : 1.0; 

                if (this.attackTimer > 0) {
                    ext = Math.sin((this.attackTimer / 15) * Math.PI) * (25 * sizeMultiplier);
                }

                // Special-animatie rotaties/veranderingen
                let isSpinning = (this.type === "SwordFighter" && this.specialTimer > 0);

                if (this.type === "Brawler") {
                    ctx.fillStyle = this.isFinalSmashing ? "#ffaa00" : (this.specialTimer > 0 ? "#ff5500" : weaponColor);
                    let upAmt = (this.specialTimer > 0) ? -15 : 0; // Uppercut gooit arm omhoog
                    ctx.fillRect(5, -8 + upAmt, (12 + ext), 10 * sizeMultiplier);
                    ctx.beginPath();
                    ctx.arc(17 + ext, -3 + upAmt, 8 * sizeMultiplier, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (this.type === "SwordFighter") {
                    ctx.save();
                    ctx.translate(8, -2);
                    if (isSpinning) {
                        ctx.rotate(this.specialTimer * 0.7); // Tol-rotatie
                    } else if (this.attackTimer > 0) {
                        ctx.rotate((ext / (25 * sizeMultiplier)) * Math.PI / 2 - Math.PI/4);
                    } else {
                        ctx.rotate(-Math.PI / 4);
                    }
                    ctx.fillStyle = "#444";
                    ctx.fillRect(0, -2, 6, 4);
                    ctx.fillStyle = this.isFinalSmashing ? "#ffaa00" : weaponColor;
                    ctx.fillRect(6, -3, 32 * sizeMultiplier, 6 * sizeMultiplier);
                    ctx.restore();
                } 
                else if (this.type === "Gunner") {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(2, -7, 15, 10);
                    ctx.fillStyle = this.isFinalSmashing ? "#ffaa00" : (this.specialTimer > 0 ? "cyan" : weaponColor);
                    ctx.fillRect(14, -9, 14 + (ext * 0.2), 14 * sizeMultiplier);
                    ctx.fillStyle = "cyan";
                    ctx.fillRect(26 + (ext * 0.2), -6, 3, 8 * sizeMultiplier);
                }

                ctx.restore();
                if (this.isFinalSmashing || (this.specialTimer > 0 && this.type === "Gunner")) ctx.restore(); 
            }

            jump() { if (this.isGrounded) this.vy = -12; }

            attack(opponent) {
                if (this.attackTimer > 0 || this.specialTimer > 0 || gameState !== "PLAYING") return; 
                
                this.attackTimer = 15; 
                let stats = Object.assign({}, classStats[this.type]);

                if (this.percentage >= 100 && this.percentage <= 230) {
                    if (Math.random() < 0.25) { 
                        this.isFinalSmashing = true;
                        stats.damage *= 2.2; stats.knockback *= 2.5; stats.range += 30; 
                    }
                }

                if (this.type === "Gunner") {
                    projectielen.push({
                        x: this.facing === 1 ? this.x + this.width + 10 : this.x - 25,
                        y: this.isFinalSmashing ? this.y : this.y + 20,
                        vx: this.facing * (this.isFinalSmashing ? 13 : 10),
                        damage: stats.damage, knockback: stats.knockback, isMega: this.isFinalSmashing, owner: this
                    });
                } else {
                    let hitzoneX = this.facing === 1 ? this.x + this.width : this.x - stats.range;
                    if (hitzoneX < opponent.x + opponent.width && hitzoneX + stats.range > opponent.x &&
                        this.y < opponent.y + opponent.height && this.y + this.height > opponent.y) {
                        
                        opponent.percentage += stats.damage;
                        opponent.vx = this.facing * (stats.knockback + (opponent.percentage * 0.15));
                        opponent.vy = -4 - (opponent.percentage * 0.08);
                        if (this.isFinalSmashing) flashScreen(); 
                    }
                }
            }

            // --- NEW: SPECIAL ATTACKS MOVE LOGICA ---
            special(opponent) {
                if (this.attackTimer > 0 || this.specialTimer > 0 || gameState !== "PLAYING") return;

                this.specialTimer = 25; // Elke special duurt 25 frames

                if (this.type === "Brawler") {
                    // Shoryuken Uppercut! Vliegt omhoog.
                    this.vy = -14;
                    this.isGrounded = false;
                    // Raakt hij de tegenstander tijdens de sprong?
                    if (Math.abs(this.x - opponent.x) < 50 && this.y > opponent.y - 40 && this.y < opponent.y + opponent.height + 40) {
                        opponent.percentage += 15;
                        opponent.vy = -13; // Lanceert mee omhoog
                        opponent.vx = this.facing * 3;
                    }
                } 
                else if (this.type === "SwordFighter") {
                    // Spin Attack activeert (physics update regelt de verplaatsing)
                    // Continue hitbox check gedurende de gehele spin (wordt afgehandeld in hoofdloop)
                } 
                else if (this.type === "Gunner") {
                    // Giga Laser Beam! Schiet na korte vertraging dwars door het veld
                    lasers.push({
                        x: this.facing === 1 ? this.x + this.width : 0,
                        y: this.y + 10,
                        width: this.facing === 1 ? canvas.width - (this.x + this.width) : this.x,
                        height: 20,
                        timer: 15,
                        owner: this
                    });
                }
            }
        }

        const p1 = new Player(250, 200, { left: "KeyA", right: "KeyD", up: "KeyW", attack: "KeyF", special: "KeyG" }, true);
        const p2 = new Player(550, 200, { left: "ArrowLeft", right: "ArrowRight", up: "ArrowUp", attack: "Period", special: "Slash" }, false);

        const keys = {};
        window.addEventListener("keydown", (e) => { keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        function flashScreen() { screenFlashTimer = 6; } 

        function handleInput() {
            if (gameState !== "PLAYING") return;
            // Speler 1
            if (keys[p1.controls.left]) p1.vx = -5;
            if (keys[p1.controls.right]) p1.vx = 5;
            if (keys[p1.controls.up]) p1.jump();
            if (keys[p1.controls.attack]) { p1.attack(p2); keys[p1.controls.attack] = false; }
            if (keys[p1.controls.special]) { p1.special(p2); keys[p1.controls.special] = false; }

            // Speler 2
            if (!isCPUGame) {
                if (keys[p2.controls.left]) p2.vx = -5;
                if (keys[p2.controls.right]) p2.vx = 5;
                if (keys[p2.controls.up]) p2.jump();
                if (keys[p2.controls.attack]) { p2.attack(p1); keys[p2.controls.attack] = false; }
                if (keys[p2.controls.special]) { p2.special(p1); keys[p2.controls.special] = false; }
            }
        }

        function updateCPU() {
            if (!isCPUGame || gameState !== "PLAYING") return;

            if (p2.x < p1.x - 40) p2.vx = 2.5;
            else if (p2.x > p1.x + 40) p2.vx = -2.5;

            if (p1.y < p2.y - 40 && Math.random() < 0.03) p2.jump();

            let dist = Math.abs(p2.x - p1.x);
            if (dist < 60 && Math.random() < 0.04) {
                if (Math.random() < 0.4) p2.special(p1);
                else p2.attack(p1);
            } else if (p2.type === "Gunner" && dist < 300 && Math.random() < 0.02) {
                if (Math.random() < 0.5) p2.special(p1);
                else p2.attack(p1);
            }
        }

        function handleContinuousHits() {
            // Checkt doorlopende aanvallen zoals de SwordFighter spin en Gunner Lasers
            [p1, p2].forEach(p => {
                let opp = (p === p1) ? p2 : p1;
                if (p.type === "SwordFighter" && p.specialTimer > 0) {
                    if (Math.abs(p.x - opp.x) < 65 && Math.abs(p.y - opp.y) < 50) {
                        opp.percentage += 0.6; // Kleine tikkende schade
                        opp.vx = p.facing * 3;
                    }
                }
            });

            // Update lasers van de Gunners
            for (let i = lasers.length - 1; i >= 0; i--) {
                let laser = lasers[i];
                laser.timer--;
                
                // Teken de laserstraal
                if (laser.timer < 10) {
                    ctx.fillStyle = "white";
                    ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
                    ctx.fillStyle = "cyan";
                    ctx.fillRect(laser.x, laser.y + 4, laser.width, laser.height - 8);

                    // Hit detection (eenmalig effectief per laser flits)
                    let target = (laser.owner === p1) ? p2 : p1;
                    if (laser.timer === 8 && target.x + target.width > laser.x && target.x < laser.x + laser.width &&
                        target.y + target.height > laser.y && target.y < laser.y + laser.height) {
                        target.percentage += 12;
                        target.vx = laser.owner.facing * (6 + (target.percentage * 0.1));
                        target.vy = -3;
                    }
                }
                if (laser.timer <= 0) lasers.splice(i, 1);
            }
        }

        function updateProjectiles() {
            for (let i = projectielen.length - 1; i >= 0; i--) {
                let proj = projectielen[i];
                proj.x += proj.vx;

                let pSize = proj.isMega ? 30 : 6;
                ctx.fillStyle = proj.isMega ? "#ffaa00" : "cyan";
                ctx.fillRect(proj.x, proj.y, proj.isMega ? 60 : 16, pSize);

                let target = (proj.owner === p1) ? p2 : p1;
                if (proj.x > target.x && proj.x < target.x + target.width && 
                    proj.y > target.y && proj.y < target.y + target.height + (proj.isMega ? 20 : 0)) {
                    
                    target.percentage += proj.damage;
                    target.vx = (proj.vx > 0 ? 1 : -1) * (proj.knockback + (target.percentage * 0.12));
                    target.vy = proj.isMega ? -6 : -3.5;
                    if (proj.isMega) flashScreen();
                    projectielen.splice(i, 1);
                    continue;
                }
                if (proj.x < -100 || proj.x > canvas.width + 100) projectielen.splice(i, 1);
            }
        }

        // --- NEW: RESPAWN LOGICA & LEVENS SYSTEEM ---
        function checkRingOuts() {
            [p1, p2].forEach(p => {
                if (p.y > canvas.height || p.x < 0 || p.x > canvas.width) {
                    if (p.stocks > 1) {
                        p.respawn(); // Verliest 1 leven en komt terug
                    } else {
                        p.stocks = 0;
                        gameState = "GAMEOVER";
                        showVictoryScreen();
                    }
                }
            });
        }

        function showVictoryScreen() {
            projectielen = []; lasers = [];
            let title = document.getElementById("victoryTitle");
            let sub = document.getElementById("victorySub");

            if (p1.stocks === 0) {
                title.innerText = isCPUGame ? "GAME OVER" : "VICTORY!";
                title.style.color = isCPUGame ? "#ff3333" : "#00ffcc";
                sub.innerText = isCPUGame ? `De CPU (${p2.type}) heeft gewonnen!` : `Speler 2 (${p2.type}) wint de match!`;
            } else {
                title.innerText = "VICTORY!";
                title.style.color = "#00ffcc";
                sub.innerText = `Speler 1 (${p1.type}) wint de match!`;
            }
            document.getElementById("victoryScreen").style.display = "flex";
        }

        // --- NEW: EXTRA STAGES MERGEN ---
        function setupStage() {
            activeStageName = document.getElementById("stageSelect").value;
            softPlatforms = [];

            if (activeStageName === "Battlefield") {
                mainStage = { x: 180, y: 350, width: 440, height: 25, depth: 35 };
                // 2 Zwevende platformpjes toevoegen
                softPlatforms.push({ x: 230, y: 240, width: 120 });
                softPlatforms.push({ x: 450, y: 240, width: 120 });
            } else if (activeStageName === "FinalDestination") {
                mainStage = { x: 100, y: 360, width: 600, height: 25, depth: 40 };
            } else if (activeStageName === "ThePit") {
                mainStage = { x: 280, y: 350, width: 240, height: 25, depth: 30 };
            }
        }

        function drawAchtergrond() {
            let spelerMidden = (p1.x + p2.x) / 2;
            cameraOffset = (spelerMidden - canvas.width / 2) * 0.08;

            let skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, "#060610");
            skyGradient.addColorStop(0.5, "#111124");
            skyGradient.addColorStop(1, "#1c1830");
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Parallax elementen
            ctx.fillStyle = "#0d0d1a";
            ctx.fillRect(40 - cameraOffset * 0.3, 180, 150, 320);
            ctx.fillRect(600 - cameraOffset * 0.3, 150, 160, 350);
            ctx.fillStyle = "#141426";
            ctx.fillRect(160 - cameraOffset * 0.6, 230, 180, 270);
            ctx.fillRect(440 - cameraOffset * 0.6, 200, 200, 300);
        }

        function draw3DStage() {
            // Teken Hoofdplatform
            ctx.fillStyle = "#2c2c3e";
            ctx.fillRect(mainStage.x, mainStage.y, mainStage.width, mainStage.height);
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(mainStage.x, mainStage.y, mainStage.width, 3);

            // Isometrische 3D rand
            ctx.fillStyle = "#1e1e2b";
            ctx.beginPath();
            ctx.moveTo(mainStage.x, mainStage.y + mainStage.height);
            ctx.lineTo(mainStage.x + 20, mainStage.y + mainStage.height + mainStage.depth);
            ctx.lineTo(mainStage.x + mainStage.width - 20, mainStage.y + mainStage.height + mainStage.depth);
            ctx.lineTo(mainStage.x + mainStage.width, mainStage.y + mainStage.height);
            ctx.closePath();
            ctx.fill();

            // Teken eventuele soft platforms (Smash stijl zwevende plankjes)
            softPlatforms.forEach(plat => {
                ctx.fillStyle = "rgba(40, 40, 60, 0.8)";
                ctx.fillRect(plat.x, plat.y, plat.width, 8);
                ctx.fillStyle = "#00ffcc";
                ctx.fillRect(plat.x, plat.y, plat.width, 2); // Neon randje
            });
        }

        function startScherm(vsCPU) {
            isCPUGame = vsCPU;
            gameState = "PLAYING";
            
            setupStage();
            p1.resetFull(); p2.resetFull();
            p1.setClass(document.getElementById("p1Char").value);
            p2.setClass(document.getElementById("p2Char").value);

            document.getElementById("menu").style.display = "none";
            document.getElementById("victoryScreen").style.display = "none";
            canvas.style.display = "block";
            document.getElementById("ui").style.display = "flex";
            
            gameLoop();
        }

        function backToMenu() {
            gameState = "MENU";
            document.getElementById("victoryScreen").style.display = "none";
            canvas.style.display = "none";
            document.getElementById("ui").style.display = "none";
            document.getElementById("menu").style.display = "flex";
        }

        function gameLoop() {
            if (gameState !== "PLAYING") return;

            handleInput();
            updateCPU();
            p1.update();
            p2.update();
            checkRingOuts();

            drawAchtergrond();
            p1.drawShadow();
            p2.drawShadow();
            draw3DStage();

            handleContinuousHits();
            p1.draw();
            p2.draw();
            updateProjectiles();

            if (screenFlashTimer > 0) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                screenFlashTimer--;
            }

            // UI renderen met Levens (Sterretjes ⭐)
            let p1UI = document.getElementById("p1-ui");
            let p2UI = document.getElementById("p2-ui");

            p1UI.style.color = classStats[p1.type].color;
            p1UI.innerHTML = `P1 (${p1.type}): ${Math.floor(p1.percentage)}% <div class="stocks">${"⭐".repeat(p1.stocks)}</div>`;
            if (p1.percentage >= 100 && p1.percentage <= 230) p1UI.classList.add("final-smash-ready");
            else p1UI.classList.remove("final-smash-ready");
            
            p2UI.style.color = classStats[p2.type].color;
            p2UI.innerHTML = `${isCPUGame ? 'CPU' : 'P2'} (${p2.type}): ${Math.floor(p2.percentage)}% <div class="stocks">${"⭐".repeat(p2.stocks)}</div>`;
            if (p2.percentage >= 100 && p2.percentage <= 230) p2UI.classList.add("final-smash-ready");
            else p2UI.classList.remove("final-smash-ready");

            requestAnimationFrame(gameLoop);
        }

        document.getElementById("btnLocal").addEventListener("click", () => startScherm(false));
        document.getElementById("btnCPU").addEventListener("click", () => startScherm(true));
        document.getElementById("btnBackToMenu").addEventListener("click", backToMenu);
    });
    </script>
</body>
</html>
