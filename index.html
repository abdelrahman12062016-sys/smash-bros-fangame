<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0; background: #05050d; color: white;
            font-family: 'Segoe UI', Arial, sans-serif; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #menu, #victoryScreen {
            position: absolute; background: rgba(10, 10, 20, 0.98);
            width: 850px; height: 530px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #ff9900; z-index: 10;
            box-shadow: 0 0 40px rgba(255, 153, 0, 0.3);
            border-radius: 12px; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        #victoryScreen { display: none; border-color: #00ffcc; box-shadow: 0 0 40px rgba(0, 255, 204, 0.4); }
        .btn {
            background: linear-gradient(135deg, #ff9900, #ff4500); color: white; border: none;
            padding: 10px 20px; margin: 5px; font-size: 16px;
            cursor: pointer; font-weight: bold; border-radius: 6px;
            width: 260px; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .btn:hover { transform: scale(1.03); filter: brightness(1.2); }
        .btn-victory { background: linear-gradient(135deg, #00ffcc, #0099ff); }
        .config-panel { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .p-box {
            background: #131324; border: 2px solid #2a2a40; padding: 8px; border-radius: 8px; text-align: center; width: 180px; box-sizing: border-box;
        }
        select {
            padding: 4px; font-size: 13px; margin-top: 4px; background: #222; color: white; border: 1px solid #555;
            border-radius: 4px; cursor: pointer; width: 100%; box-sizing: border-box;
        }
        canvas { background: #000; border: 4px solid #222; border-radius: 8px; display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        #ui { display: none; justify-content: space-between; width: 800px; margin-top: 10px; }
        .p-ui-box { padding: 6px 12px; border-radius: 6px; background: rgba(0,0,0,0.6); width: 180px; text-align: center; font-size: 14px; font-weight: bold; border-bottom: 4px solid #fff; }
        .stocks { color: #ffaa00; font-size: 12px; margin-top: 2px; }
        #controllerStatus { color: #00ffcc; font-size: 13px; font-weight: bold; margin-bottom: 10px; display: none; text-shadow: 0 0 10px rgba(0,255,204,0.4); }
    </style>
</head>

    <script>
    window.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gravity = 0.5;

        let audioCtx = null;
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); let now = audioCtx.currentTime;
            if(type==="jump"){ osc.type="square"; osc.frequency.setValueAtTime(140, now); osc.frequency.exponentialRampToValueAtTime(380, now+0.12); gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, now+0.12); osc.start(now); osc.stop(now+0.12); }
            if(type==="hit"){ osc.type="sawtooth"; osc.frequency.setValueAtTime(110, now); osc.frequency.linearRampToValueAtTime(30, now+0.1); gain.gain.setValueAtTime(0.18, now); gain.gain.linearRampToValueAtTime(0, now+0.1); osc.start(now); osc.stop(now+0.1); }
            if(type==="laser"){ osc.type="triangle"; osc.frequency.setValueAtTime(550, now); osc.frequency.exponentialRampToValueAtTime(180, now+0.18); gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, now+0.18); osc.start(now); osc.stop(now+0.18); }
            if(type==="block"){ osc.type="sine"; osc.frequency.setValueAtTime(280, now); gain.gain.setValueAtTime(0.12, now); gain.gain.linearRampToValueAtTime(0, now+0.08); osc.start(now); osc.stop(now+0.08); }
        }

        let gameState = "MENU", matchMode = "FFA";
        let spelers = [], projectielen = [], lasers = [], particles = [], blastEffects = [];
        let shakeTimer = 0, shakeIntensity = 0, cameraOffset = 0;
        let mainStage = { x: 150, y: 340, width: 500, height: 25, depth: 35 }, softPlatforms = [];
        let isPaused = false;

        // Gamepad tracking for multiple controllers
        let connectedControllers = new Set();
        let controllerPlayerMap = {}; // Maps controller index to player index
        
        window.addEventListener("gamepadconnected", (e) => {
            connectedControllers.add(e.gamepad.index);
            document.getElementById("controllerStatus").style.display = "block";
            document.getElementById("controllerStatus").textContent = `🎮 CONTROLLERS VERBONDEN: ${connectedControllers.size}`;
        });
        window.addEventListener("gamepaddisconnected", (e) => {
            connectedControllers.delete(e.gamepad.index);
            delete controllerPlayerMap[e.gamepad.index];
            if (connectedControllers.size === 0) {
                document.getElementById("controllerStatus").style.display = "none";
            } else {
                document.getElementById("controllerStatus").textContent = `🎮 CONTROLLERS VERBONDEN: ${connectedControllers.size}`;
            }
        });

        const classStats = {
            Brawler:      { weaponColor: "#ff4500", damage: 15, range: 45, knockback: 8.5 },
            SwordFighter: { weaponColor: "#e0e0e0", damage: 12, range: 55, knockback: 6.2 },
            Gunner:       { weaponColor: "#00ffff", damage: 5,  range: 0,  knockback: 3.8 },
            Ninja:        { weaponColor: "#bf55ec", damage: 9,  range: 40, knockback: 5.5 },
            Mage:         { weaponColor: "#4d13d1", damage: 11, range: 0,  knockback: 6.0 },
            Viking:       { weaponColor: "#f5d76e", damage: 22, range: 60, knockback: 11.0 },
            Alien:        { weaponColor: "#00ff66", damage: 8,  range: 45, knockback: 5.0 },
            Robot:        { weaponColor: "#95a5a6", damage: 14, range: 45, knockback: 7.5 },
            Pirate:       { weaponColor: "#f22613", damage: 13, range: 50, knockback: 8.0 },
            SonicBoy:     { weaponColor: "#ff007f", damage: 7,  range: 50, knockback: 4.5 },
            Knight:       { weaponColor: "#c0c0c0", damage: 18, range: 50, knockback: 10.0 },
            Archer:       { weaponColor: "#d2691e", damage: 10, range: 0,  knockback: 4.5 },
            Samurai:      { weaponColor: "#daa520", damage: 16, range: 60, knockback: 9.0 },
            Dragon:       { weaponColor: "#ff6600", damage: 20, range: 55, knockback: 11.5 },
            Vampire:      { weaponColor: "#8b0000", damage: 12, range: 40, knockback: 7.0 },
            Hunter:       { weaponColor: "#8b4513", damage: 11, range: 45, knockback: 6.5 },
            Cyborg:       { weaponColor: "#1e90ff", damage: 15, range: 50, knockback: 8.0 },
            Phoenix:      { weaponColor: "#ff4500", damage: 14, range: 45, knockback: 8.5 },
            Wraith:       { weaponColor: "#9370db", damage: 9,  range: 40, knockback: 5.0 }
        };

        const playerMeta = [
            { id: 1, baseColor: "#ff4444", startX: 200, name: "P1" },
            { id: 2, baseColor: "#4444ff", startX: 600, name: "P2" },
            { id: 3, baseColor: "#22cc22", startX: 320, name: "P3" },
            { id: 4, baseColor: "#eeee22", startX: 480, name: "P4" }
        ];

        class Player {
            constructor(meta, controls) {
                this.id = meta.id; this.startX = meta.startX; this.startY = 180;
                this.x = this.startX; this.y = this.startY; this.name = meta.name;
                this.width = 38; this.height = 56;
                this.type = "Brawler"; this.color = meta.baseColor; this.team = null;
                this.vx = 0; this.vy = 0; this.percentage = 0; this.stocks = 3;
                this.isGrounded = false; this.facing = this.id % 2 === 1 ? 1 : -1;
                this.controls = controls; this.isCPU = true; this.aiLevel = 3; this.isActive = true;
                
                this.attackTimer = 0; this.specialTimer = 0; this.animFrame = 0;
                this.respawnTimer = 0; this.isShielding = false; this.shieldHealth = 40; this.jumpsLeft = 2; this.airDodgeTimer = 0;
                this.gravityFieldActive = false;
            }

            reset(type, isCPU, aiLevel, teamMode) {
                this.x = this.startX; this.y = this.startY; this.vx = 0; this.vy = 0;
                this.percentage = 0; this.stocks = 3; this.isActive = true;
                this.type = type; this.isCPU = isCPU; this.aiLevel = parseInt(aiLevel);
                this.attackTimer = 0; this.specialTimer = 0; this.animFrame = 0;
                this.isShielding = false; this.shieldHealth = 40; this.jumpsLeft = 2; this.airDodgeTimer = 0;
                this.gravityFieldActive = false;
                
                if (teamMode === "2v2") {
                    this.team = (this.id === 1 || this.id === 3) ? "ROOD" : "BLAUW";
                    this.color = this.team === "ROOD" ? (this.id === 1 ? "#ff3333" : "#ff7777") : (this.id === 2 ? "#3333ff" : "#7777ff");
                } else {
                    this.team = null; this.color = playerMeta[this.id-1].baseColor;
                }
            }

            respawn() {
                this.stocks--; if (this.stocks <= 0) { this.isActive = false; return; }
                this.x = this.startX; this.y = 100; this.vx = 0; this.vy = 0;
                this.percentage = 0; this.respawnTimer = 60; this.shieldHealth = 40; this.jumpsLeft = 2;
            }

            update() {
                if (!this.isActive) return;
                if (this.respawnTimer > 0) this.respawnTimer--;
                if (this.airDodgeTimer > 0) this.airDodgeTimer--;

                if (this.airDodgeTimer > 10) { this.vy = 0; return; }

                if (this.isShielding && this.isGrounded) {
                    this.vx *= 0.2; this.shieldHealth -= 0.25;
                    if (this.shieldHealth <= 5) this.isShielding = false;
                } else {
                    if (this.shieldHealth < 40) this.shieldHealth += 0.08;
                }

                if (this.gravityFieldActive) {
                    this.vy -= 0.15; if (this.vy < -3) this.vy = -3;
                } else {
                    this.vy += gravity;
                }

                this.x += this.vx; this.y += this.vy;
                if (this.vx > 0.1 && !this.isShielding) this.facing = 1;
                if (this.vx < -0.1 && !this.isShielding) this.facing = -1;
                
                let friction = this.isGrounded ? (this.type === "Robot" ? 0.72 : 0.8) : 0.96;
                this.vx *= friction;

                if (Math.abs(this.vx) > 0.2 && this.isGrounded) this.animFrame += 0.22;
                if (this.isGrounded) this.jumpsLeft = 2;

                if (this.attackTimer > 0) this.attackTimer--;
                if (this.specialTimer > 0) {
                    this.specialTimer--;
                    if (this.type === "SwordFighter" && this.specialTimer > 5) this.vx = this.facing * 4.5;
                    if (this.type === "Brawler" && this.specialTimer > 0) {
                        createParticles(this.x + this.width/2 - cameraOffset*0.3, this.y + this.height/2, "#ff6600", 2);
                    }
                }

                if (this.x + this.width > mainStage.x && this.x < mainStage.x + mainStage.width &&
                    this.y + this.height <= mainStage.y + 10 && this.y + this.height + this.vy >= mainStage.y) {
                    this.y = mainStage.y - this.height; this.vy = 0; this.isGrounded = true;
                } else { this.isGrounded = false; }

                if (!this.isGrounded && this.vy >= 0) {
                    for (let plat of softPlatforms) {
                        if (this.x + this.width > plat.x && this.x < plat.x + plat.width &&
                            this.y + this.height <= plat.y + 8 && this.y + this.height + this.vy >= plat.y) {
                            this.y = plat.y - this.height; this.vy = 0; this.isGrounded = true; break;
                        }
                    }
                }
                this.gravityFieldActive = false;
            }

            drawShadow() {
                if (!this.isActive || this.respawnTimer % 4 >= 2 || this.airDodgeTimer > 10) return;
                if (this.x + this.width > mainStage.x && this.x < mainStage.x + mainStage.width && this.y <= mainStage.y) {
                    let distance = mainStage.y - (this.y + this.height);
                    let shadowWidth = Math.max(6, this.width - (distance * 0.08));
                    let shadowAlpha = Math.max(0, 0.35 - (distance * 0.002));
                    ctx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`; ctx.beginPath();
                    ctx.ellipse(this.x + this.width/2 - cameraOffset*0.3, mainStage.y, shadowWidth, 4, 0, 0, Math.PI * 2); ctx.fill();
                }
            }

            draw() {
                if (!this.isActive || this.respawnTimer % 4 >= 2) return;
                if (this.airDodgeTimer > 10) ctx.globalAlpha = 0.35;

                let cx = this.x + this.width / 2 - cameraOffset * 0.3;
                let cy = this.y + this.height / 2;

                if (this.isShielding) {
                    ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, this.shieldHealth, 0, Math.PI*2);
                    ctx.fillStyle = this.team === "BLAUW" ? "rgba(50,50,255,0.4)" : "rgba(255,50,50,0.4)";
                    ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1.5; ctx.fill(); ctx.stroke(); ctx.restore();
                }

                ctx.save(); ctx.translate(cx, cy); ctx.scale(this.facing, 1);
                
                let legSwing = Math.sin(this.animFrame) * 11; 
                if (!this.isGrounded) legSwing = 8; 
                ctx.fillStyle = "#11111e"; 
                ctx.fillRect(-11, 14, 6, 14 + legSwing * 0.25); 
                ctx.fillRect(4, 14, 6, 14 - legSwing * 0.25);

                ctx.fillStyle = this.color; ctx.fillRect(-14, -13, 28, 27);
                
                if (this.type === "Alien") ctx.fillStyle = "#33ff33";
                else if (this.type === "Robot") ctx.fillStyle = "#bdc3c7";
                else ctx.fillStyle = "#ffdbac"; 
                ctx.fillRect(-8, -28, 16, 15);

                ctx.fillStyle = "#000"; 
                if (this.type === "Ninja") { ctx.fillStyle = "purple"; ctx.fillRect(-8, -24, 16, 4); ctx.fillStyle = "white"; ctx.fillRect(4, -23, 2, 2); }
                else if (this.type === "Robot") { ctx.fillStyle = "red"; ctx.fillRect(2, -25, 6, 2); }
                else if (this.type === "Alien") { ctx.fillStyle = "black"; ctx.fillRect(2, -26, 5, 5); }
                else { ctx.fillRect(4, -24, 2, 3); }

                let ext = 0; if (this.attackTimer > 0) ext = Math.sin((this.attackTimer/14)*Math.PI)*24;
                
                ctx.fillStyle = classStats[this.type].weaponColor;
                if (this.type === "Brawler") { 
                    ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = "#ff3300"; ctx.fillStyle = "#ff2200";
                    ctx.fillRect(6 + ext, -5, 13, 11); ctx.restore();
                } else if (this.type === "SwordFighter") { 
                    ctx.save(); 
                    if (this.specialTimer > 0) {
                        let spinAngle = (this.specialTimer * 0.4) * Math.PI; ctx.rotate(spinAngle);
                        ctx.fillStyle = "#00ffcc"; ctx.fillRect(4, -3, 34, 6);
                    } else { ctx.rotate(-Math.PI/4 + (this.attackTimer > 0 ? (ext * 0.05) : 0)); ctx.fillRect(4, -2, 28, 4); }
                    ctx.restore(); 
                } else if (this.type === "Gunner") { 
                    ctx.fillRect(2, -6, 14, 8); ctx.fillStyle = "#00ffff"; ctx.fillRect(16, -5, 4, 6);
                } else if (this.type === "Ninja") {
                    ctx.fillStyle = "#444"; ctx.fillRect(2, -2, 18 + ext*0.2, 3);
                } else if (this.type === "Viking") {
                    ctx.fillStyle = "#7f8c8d"; ctx.fillRect(4, -20, 4, 24);
                    ctx.fillStyle = "#ecf0f1"; ctx.fillRect(6 + ext*0.2, -26, 14, 14);
                } else if (this.type === "Pirate") {
                    ctx.fillStyle = "#f1c40f"; ctx.fillRect(2, -2, 20 + ext*0.3, 5);
                } else if (this.type === "SonicBoy") {
                    ctx.fillStyle = "#ff007f"; ctx.fillRect(-10, -32, 20, 4);
                    ctx.fillRect(-12, -28, 4, 8); ctx.fillRect(8, -28, 4, 8);
                } else if (this.type === "Knight") {
                    ctx.fillStyle = "#c0c0c0"; ctx.fillRect(4, -20, 4, 24);
                    ctx.fillStyle = "#a9a9a9"; ctx.fillRect(6 + ext*0.2, -26, 14, 14);
                    ctx.fillStyle = "#696969"; ctx.fillRect(-8, -32, 16, 4);
                } else if (this.type === "Archer") {
                    ctx.fillStyle = "#8b4513"; ctx.fillRect(6 + ext, -10, 12, 6);
                    ctx.fillStyle = "#d2691e"; ctx.fillRect(2, -3, 20, 3);
                } else if (this.type === "Samurai") {
                    ctx.fillStyle = "#daa520"; ctx.rotate(Math.PI/6 + (this.attackTimer > 0 ? ext * 0.08 : 0));
                    ctx.fillRect(4, -3, 30, 5); ctx.restore();
                    ctx.save(); ctx.translate(cx, cy); ctx.scale(this.facing, 1);
                    ctx.fillStyle = "#8b0000"; ctx.fillRect(-8, -30, 16, 4);
                } else if (this.type === "Dragon") {
                    ctx.fillStyle = "#ff6600"; ctx.fillRect(2, -8, 16, 10);
                    ctx.fillStyle = "#ff4500"; ctx.fillRect(18, -6, 8, 8);
                    ctx.fillStyle = "#ffaa00"; for(let i=-2; i<=2; i+=2) ctx.fillRect(4 + i, -30 + i*1.5, 3, 5);
                } else if (this.type === "Vampire") {
                    ctx.fillStyle = "#8b0000"; ctx.fillRect(-14, -30, 28, 5);
                    ctx.fillStyle = "#4d0000"; ctx.fillRect(-10, -32, 20, 3);
                    ctx.fillStyle = "#fff"; ctx.fillRect(3, -24, 2, 3); ctx.fillRect(-5, -24, 2, 3);
                } else if (this.type === "Hunter") {
                    ctx.fillStyle = "#8b4513"; ctx.fillRect(6 + ext*0.3, -8, 14, 8);
                    ctx.fillStyle = "#228b22"; ctx.fillRect(-8, -30, 16, 4);
                } else if (this.type === "Cyborg") {
                    ctx.fillStyle = "#1e90ff"; ctx.fillRect(4, -20, 4, 24);
                    ctx.fillStyle = "#00ffff"; ctx.fillRect(6 + ext*0.2, -26, 14, 14);
                    ctx.fillStyle = "#ff0000"; ctx.fillRect(2, -25, 3, 3); ctx.fillRect(9, -25, 3, 3);
                } else if (this.type === "Phoenix") {
                    ctx.fillStyle = "#ff4500"; ctx.rotate((this.animFrame * 0.1) % Math.PI * 2);
                    ctx.fillRect(-5, -3, 10, 25); ctx.restore();
                    ctx.save(); ctx.translate(cx, cy); ctx.scale(this.facing, 1);
                    ctx.fillStyle = "#ffaa00"; ctx.fillRect(-12, -28, 24, 5);
                } else if (this.type === "Wraith") {
                    ctx.fillStyle = "#9370db"; ctx.globalAlpha = 0.7;
                    ctx.fillRect(-14, -28, 28, 30);
                    ctx.fillStyle = "#e6ccff"; ctx.fillRect(3, -24, 2, 3); ctx.fillRect(-5, -24, 2, 3);
                    ctx.globalAlpha = 1.0;
                } else if (this.type === "Mage") {
                    ctx.fillStyle = "#4d13d1"; ctx.fillRect(-8, -30, 16, 6);
                    ctx.fillStyle = "#6a23c5"; ctx.fillRect(4, -8, 6, 8);
                }

                ctx.restore(); ctx.globalAlpha = 1.0;
            }

            jump() {
                if (this.isShielding || !this.isActive) return;
                if (this.isGrounded) { this.vy = -11.5; this.jumpsLeft = 1; playSound("jump"); }
                else if (this.jumpsLeft > 0) { this.vy = -10.5; this.jumpsLeft = 0; playSound("jump"); createParticles(this.x+this.width/2 - cameraOffset*0.3, this.y+this.height, "white", 4); }
            }

            attack() {
                if (this.attackTimer > 0 || this.specialTimer > 0 || this.isShielding || this.airDodgeTimer > 10 || !this.isActive) return;
                this.attackTimer = 14; let stats = classStats[this.type];

                if (this.type === "Gunner") {
                    playSound("laser"); projectielen.push({ type: "laser", x: this.facing === 1 ? this.x+this.width+4 : this.x-16, y: this.y+16, vx: this.facing*10, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else if (this.type === "Ninja") {
                    playSound("laser"); projectielen.push({ type: "shuriken", x: this.x, y: this.y+12, vx: this.facing*11, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else if (this.type === "Mage") {
                    playSound("laser"); projectielen.push({ type: "fireball", x: this.x, y: this.y+10, vx: this.facing*7, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else if (this.type === "Alien") {
                    playSound("laser"); projectielen.push({ type: "eyelaser", x: this.x, y: this.y+4, vx: this.facing*14, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else if (this.type === "Archer") {
                    playSound("laser"); projectielen.push({ type: "arrow", x: this.x, y: this.y+8, vx: this.facing*12, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else if (this.type === "Dragon") {
                    playSound("laser"); projectielen.push({ type: "fireball", x: this.x, y: this.y+5, vx: this.facing*9, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else if (this.type === "Vampire") {
                    playSound("hit"); projectielen.push({ type: "bloodmist", x: this.x, y: this.y, vx: this.facing*6, damage: stats.damage * 0.8, knockback: stats.knockback * 0.8, owner: this });
                } else if (this.type === "Hunter") {
                    playSound("laser"); projectielen.push({ type: "hunter_shot", x: this.x, y: this.y+10, vx: this.facing*11, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else if (this.type === "Phoenix") {
                    playSound("laser"); projectielen.push({ type: "fireball", x: this.x, y: this.y+8, vx: this.facing*8, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else if (this.type === "Cyborg") {
                    playSound("laser"); projectielen.push({ type: "laser", x: this.facing === 1 ? this.x+this.width+4 : this.x-16, y: this.y+16, vx: this.facing*11, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else {
                    let hx = this.facing === 1 ? this.x + this.width : this.x - stats.range;
                    spelers.forEach(opp => {
                        if (opp === this || !opp.isActive || opp.airDodgeTimer > 10 || (this.team && opp.team === this.team)) return;
                        if (hx < opp.x + opp.width && hx + stats.range > opp.x && this.y < opp.y + opp.height && this.y + this.height > opp.y) {
                            if (opp.isShielding) { opp.shieldHealth -= stats.damage*0.7; playSound("block"); } 
                            else { this.hitOpponent(opp, stats.damage, this.facing * (stats.knockback + (opp.percentage * 0.13))); }
                        }
                    });
                }
            }

            special() {
                if (this.attackTimer > 0 || this.specialTimer > 0 || this.isShielding || this.airDodgeTimer > 10 || !this.isActive) return;
                this.specialTimer = 25;

                if (this.type === "Brawler") {
                    this.vy = -14; this.isGrounded = false; this.vx = this.facing * 2; playSound("jump"); triggerShake(4, 10);
                    spelers.forEach(opp => { if (opp !== this && Math.abs(this.x - opp.x) < 60) this.hitOpponent(opp, 15, this.facing * 5, -12); });
                } else if (this.type === "SwordFighter") {
                    playSound("hit");
                } else if (this.type === "Gunner") {
                    playSound("laser"); triggerShake(6, 12);
                    lasers.push({ type: "plasma", x: this.facing === 1 ? this.x+this.width : 0, y: this.y+8, width: this.facing === 1 ? canvas.width : this.x, height: 24, timer: 15, owner: this });
                } else if (this.type === "Ninja") {
                    createParticles(this.x, this.y, "purple", 15); this.x += this.facing * 140; 
                    if (this.x < 20) this.x = 20; if (this.x > canvas.width - 50) this.x = canvas.width - 50;
                    playSound("jump");
                } else if (this.type === "Mage") {
                    triggerShake(8, 15);
                    lasers.push({ type: "lightning", x: this.x - 10, y: 0, width: 60, height: canvas.height, timer: 20, owner: this });
                } else if (this.type === "Viking") {
                    this.vy = 14;
                    projectielen.push({ type: "wave", x: this.x, y: this.y + 20, vx: 5, damage: 10, knockback: 7, owner: this });
                    projectielen.push({ type: "wave", x: this.x, y: this.y + 20, vx: -5, damage: 10, knockback: 7, owner: this });
                } else if (this.type === "Alien") {
                    lasers.push({ type: "gravity", x: this.x - 80, y: this.y - 80, width: 200, height: 200, timer: 40, owner: this });
                } else if (this.type === "Robot") {
                    lasers.push({ type: "explosion", x: this.x - 50, y: this.y - 50, width: 140, height: 140, timer: 18, owner: this });
                } else if (this.type === "Pirate") {
                    projectielen.push({ type: "cannonball", x: this.x, y: this.y + 10, vx: this.facing * 4.5, damage: 20, knockback: 12, owner: this });
                } else if (this.type === "SonicBoy") {
                    lasers.push({ type: "sonic", x: this.x - 60, y: this.y - 20, width: 160, height: 100, timer: 30, owner: this });
                } else if (this.type === "Knight") {
                    playSound("hit"); triggerShake(5, 12);
                    this.vx = this.facing * 6; this.vy = -8;
                    spelers.forEach(opp => { if (opp !== this && Math.abs(this.x - opp.x) < 70) this.hitOpponent(opp, 18, this.facing * 6, -10); });
                } else if (this.type === "Archer") {
                    playSound("laser");
                    for (let angle = -0.4; angle <= 0.4; angle += 0.2) {
                        projectielen.push({ type: "arrow", x: this.x, y: this.y, vx: Math.cos(angle) * 6 * this.facing, vy: Math.sin(angle) * 6, damage: 12, knockback: 6, owner: this });
                    }
                } else if (this.type === "Samurai") {
                    playSound("hit"); triggerShake(6, 15);
                    this.vx = this.facing * 8; 
                    spelers.forEach(opp => { if (opp !== this && Math.abs(this.x - opp.x) < 65) this.hitOpponent(opp, 16, this.facing * 7, -9); });
                } else if (this.type === "Dragon") {
                    playSound("laser"); triggerShake(10, 20);
                    projectielen.push({ type: "fireball", x: this.x, y: this.y - 5, vx: this.facing * 5, damage: 18, knockback: 10, owner: this });
                    this.vy = -12;
                } else if (this.type === "Vampire") {
                    playSound("jump"); createParticles(this.x, this.y, "#8b0000", 20);
                    this.vy = -14; this.vx = this.facing * 3;
                    spelers.forEach(opp => { if (opp !== this && Math.abs(this.x - opp.x) < 50) { this.hitOpponent(opp, 11, this.facing * 4, -8); this.percentage = Math.max(0, this.percentage - 5); } });
                } else if (this.type === "Hunter") {
                    playSound("laser");
                    projectielen.push({ type: "hunter_shot", x: this.x, y: this.y + 5, vx: this.facing * 7, damage: 13, knockback: 7, owner: this });
                } else if (this.type === "Cyborg") {
                    playSound("hit"); triggerShake(7, 14);
                    lasers.push({ type: "beam", x: this.facing === 1 ? this.x+this.width : 0, y: this.y, width: this.facing === 1 ? canvas.width : this.x, height: 40, timer: 18, owner: this });
                } else if (this.type === "Phoenix") {
                    playSound("laser"); triggerShake(8, 16);
                    createParticles(this.x, this.y, "#ff4500", 25);
                    lasers.push({ type: "fire", x: this.x - 60, y: this.y - 40, width: 150, height: 120, timer: 25, owner: this });
                    this.vy = -10;
                } else if (this.type === "Wraith") {
                    playSound("jump"); createParticles(this.x, this.y, "#9370db", 18);
                    this.x += this.facing * 100; this.vy = -6;
                    if (this.x < 20) this.x = 20; if (this.x > canvas.width - 50) this.x = canvas.width - 50;
                }
            }

            hitOpponent(opp, dmg, kx, ky = -3.5 - (opp.percentage * 0.07)) {
                if (opp.type === "Robot") kx *= 0.75;
                opp.percentage += dmg; playSound("hit"); opp.vx = kx; opp.vy = ky;
                triggerShake(dmg > 10 ? 8 : 4, 8);
                createParticles(opp.x + opp.width/2 - cameraOffset*0.3, opp.y + opp.height/2, classStats[this.type].weaponColor, 12);
            }
        }

        spelers = [
            new Player(playerMeta[0], { left: "KeyA", right: "KeyD", up: "KeyW", attack: "KeyF", special: "KeyG", shield: "ShiftLeft" }),
            new Player(playerMeta[1], { left: "ArrowLeft", right: "ArrowRight", up: "ArrowUp", attack: "Period", special: "Slash", shield: "ArrowDown" }),
            new Player(playerMeta[2], null),
            new Player(playerMeta[3], null)
        ];

        const keys = {};
        window.addEventListener("keydown", (e) => { initAudio(); keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        function triggerShake(intensity, duration) { shakeTimer = duration; shakeIntensity = intensity; }
        function createParticles(x, y, color, amount) {
            for(let i=0; i<amount; i++) {
                particles.push({ x: x, y: y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, size: Math.random()*3+2, alpha: 1, color: color });
            }
        }

        function handleGamepadInput() {
            const gamepads = navigator.getGamepads();
            
            // Auto-assign controllers to human players
            for (let i = 0; i < gamepads.length; i++) {
                if (!gamepads[i]) continue;
                if (!controllerPlayerMap[i]) {
                    // Find first available human player not controlled by keyboard
                    for (let p = 0; p < spelers.length; p++) {
                        if (spelers[p].isActive && !spelers[p].isCPU && !Object.values(controllerPlayerMap).includes(p)) {
                            controllerPlayerMap[i] = p;
                            break;
                        }
                    }
                }
            }
            
            // Process input for each connected gamepad
            for (let controllerIdx of connectedControllers) {
                const gp = gamepads[controllerIdx];
                if (!gp || controllerPlayerMap[controllerIdx] === undefined) continue;
                
                const playerIdx = controllerPlayerMap[controllerIdx];
                const p = spelers[playerIdx];
                
                if (!p || !p.isActive) continue;

                // Shield (L2/R2 or L1/R1 triggers)
                p.isShielding = (gp.buttons[6]?.pressed || gp.buttons[7]?.pressed || gp.buttons[4]?.pressed || gp.buttons[5]?.pressed) && p.isGrounded;

                if (!p.isShielding && p.airDodgeTimer <= 10) {
                    // Left stick or D-pad movement
                    if (gp.axes[0] < -0.3 || gp.buttons[14]?.pressed) p.vx = -4.5;
                    if (gp.axes[0] > 0.3 || gp.buttons[15]?.pressed) p.vx = 4.5;

                    // Button A / Cross (bottom button) = Jump
                    const jumpPressed = gp.buttons[0]?.pressed;
                    const prevJumpKey = `prevJump_P${playerIdx}_C${controllerIdx}`;
                    if (jumpPressed && !window[prevJumpKey]) { 
                        p.jump(); 
                    }
                    window[prevJumpKey] = jumpPressed;
                }

                // Button X / Square (left button) = Attack
                const attackPressed = gp.buttons[2]?.pressed;
                const prevAttackKey = `prevAttack_P${playerIdx}_C${controllerIdx}`;
                if (attackPressed && !window[prevAttackKey]) { 
                    p.attack(); 
                }
                window[prevAttackKey] = attackPressed;

                // Button Y / Triangle (top button) = Special
                const specialPressed = gp.buttons[3]?.pressed;
                const prevSpecialKey = `prevSpecial_P${playerIdx}_C${controllerIdx}`;
                if (specialPressed && !window[prevSpecialKey]) { 
                    p.special(); 
                }
                window[prevSpecialKey] = specialPressed;
            }
        }

        function handleInput() {
            let p1 = spelers[0];
            if (p1.isActive) {
                p1.isShielding = keys[p1.controls.shield] && p1.isGrounded;
                if (!p1.isShielding && p1.airDodgeTimer <= 10) {
                    if (keys[p1.controls.left]) p1.vx = -4.5;
                    if (keys[p1.controls.right]) p1.vx = 4.5;
                    if (keys[p1.controls.up]) { p1.jump(); keys[p1.controls.up] = false; }
                }
                if (keys[p1.controls.attack]) { p1.attack(); keys[p1.controls.attack] = false; }
                if (keys[p1.controls.special]) { p1.special(); keys[p1.controls.special] = false; }
            }

            let p2 = spelers[1];
            if (p2.isActive && !p2.isCPU) {
                p2.isShielding = keys[p2.controls.shield] && p2.isGrounded;
                if (!p2.isShielding && p2.airDodgeTimer <= 10) {
                    if (keys[p2.controls.left]) p2.vx = -4.5;
                    if (keys[p2.controls.right]) p2.vx = 4.5;
                    if (keys[p2.controls.up]) { p2.jump(); keys[p2.controls.up] = false; }
                }
                if (keys[p2.controls.attack]) { p2.attack(); keys[p2.controls.attack] = false; }
                if (keys[p2.controls.special]) { p2.special(); keys[p2.controls.special] = false; }
            }

            handleGamepadInput(); // Voeg de controller controls toe voor P1
        }

        function updateCPUs() {
            spelers.forEach(p => {
                if (!p.isActive || !p.isCPU) return;

                let target = null, minDist = 9999;
                spelers.forEach(opp => {
                    if (opp === p || !opp.isActive || (p.team && opp.team === p.team)) return;
                    let d = Math.abs(p.x - opp.x);
                    if (d < minDist) { minDist = d; target = opp; }
                });

                if (!target) return;
                let reactionChance = p.aiLevel * 0.09;

                if (p.y > mainStage.y + 20 && p.jumpsLeft > 0 && Math.random() < reactionChance) { p.jump(); p.vx = (p.x < canvas.width/2) ? 3.5 : -3.5; return; }

                if (!p.isShielding && p.airDodgeTimer <= 10 && Math.random() < reactionChance) {
                    if (p.x < target.x - 30) p.vx = 2.2 + (p.aiLevel * 0.15);
                    else if (p.x > target.x + 30) p.vx = -(2.2 + (p.aiLevel * 0.15));
                }

                if (minDist < 60 && Math.random() < (p.aiLevel * 0.02)) {
                    if (Math.random() < 0.4) p.special(); else p.attack();
                }
            });
        }

        function handleContinuousHits() {
            spelers.forEach(p => {
                if (!p.isActive || p.type !== "SwordFighter" || p.specialTimer <= 0) return;
                spelers.forEach(opp => {
                    if (opp === p || !opp.isActive || (p.team && opp.team === p.team)) return;
                    if (Math.abs((p.x + p.width/2) - (opp.x + opp.width/2)) < 55 && Math.abs(p.y - opp.y) < 45) {
                        opp.percentage += 0.4; opp.vx = p.facing * 2.5;
                    }
                });
            });

            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i]; l.timer--;
                
                spelers.forEach(target => {
                    if (!target.isActive || target === l.owner || (l.owner.team && target.team === l.owner.team)) return;
                    if (target.x + target.width > l.x && target.x < l.x + l.width && target.y + target.height > l.y && target.y < l.y + l.height) {
                        if (l.type === "gravity") {
                            target.gravityFieldActive = true;
                        } else if (l.timer === 6) {
                            l.owner.hitOpponent(target, l.type === "lightning" ? 16 : 9, l.owner.facing * 6);
                        }
                    }
                });
                if (l.timer <= 0) lasers.splice(i, 1);
            }
        }

        function updateProjectiles() {
            for (let i = projectielen.length - 1; i >= 0; i--) {
                let proj = projectielen[i]; proj.x += proj.vx;
                
                ctx.save();
                if (proj.type === "shuriken") { ctx.fillStyle = "purple"; ctx.fillRect(proj.x - cameraOffset*0.3, proj.y, 10, 10); }
                else if (proj.type === "fireball") { ctx.fillStyle = "orange"; ctx.beginPath(); ctx.arc(proj.x - cameraOffset*0.3, proj.y, 8, 0, Math.PI*2); ctx.fill(); }
                else if (proj.type === "cannonball") { ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(proj.x - cameraOffset*0.3, proj.y, 12, 0, Math.PI*2); ctx.fill(); }
                else if (proj.type === "wave") { ctx.fillStyle = "yellow"; ctx.fillRect(proj.x - cameraOffset*0.3, proj.y, 16, 30); }
                else { ctx.fillStyle = "cyan"; ctx.fillRect(proj.x - cameraOffset*0.3, proj.y, 14, 5); }
                ctx.restore();

                spelers.forEach(target => {
                    if (!target.isActive || target === proj.owner || (proj.owner.team && target.team === proj.owner.team)) return;
                    if (proj.x > target.x && proj.x < target.x + target.width && proj.y > target.y && proj.y < target.y + target.height) {
                        proj.owner.hitOpponent(target, proj.damage, (proj.vx > 0 ? 1 : -1) * proj.knockback);
                        projectielen.splice(i, 1);
                    }
                });

                if (proj.x < -100 || proj.x > canvas.width + 100) projectielen.splice(i, 1);
            }
        }

        function checkRingOuts() {
            spelers.forEach(p => {
                if (!p.isActive) return;
                if (p.y > canvas.height || p.x < 0 || p.x > canvas.width || p.y < -40) {
                    let bx = Math.max(10, Math.min(canvas.width - 50, p.x - cameraOffset*0.3));
                    let isVertical = (p.y > canvas.height || p.y < -40);
                    
                    blastEffects.push({ x: isVertical ? bx : (p.x < 0 ? 0 : canvas.width - 40), y: 0, width: isVertical ? 45 : canvas.width, height: isVertical ? canvas.height : 45, color: p.color, timer: 20 });
                    createParticles(p.x + p.width/2 - cameraOffset*0.3, Math.max(0, Math.min(canvas.height, p.y)), p.color, 30);
                    triggerShake(12, 18); p.respawn();
                }
            });

            let levendeTeams = new Set(); let actieveSpelers = spelers.filter(p => p.isActive);
            if (matchMode === "2v2") {
                actieveSpelers.forEach(p => levendeTeams.add(p.team));
                if (levendeTeams.size <= 1) { gameState = "GAMEOVER"; showVictoryScreen(Array.from(levendeTeams)[0]); }
            } else {
                if (actieveSpelers.length <= 1) { gameState = "GAMEOVER"; showVictoryScreen(actieveSpelers[0] ? actieveSpelers[0].name : "Niemand"); }
            }
        }

        function showVictoryScreen(winnaar) {
            document.getElementById("victoryScreen").style.display = "flex";
            document.getElementById("victorySub").innerText = matchMode === "2v2" ? `Team ${winnaar} wint de strijd!` : `${winnaar} rekent iedereen af!`;
        }

        function startScherm() {
            matchMode = document.getElementById("matchMode").value; gameState = "PLAYING"; blastEffects = [];
            let stageName = document.getElementById("stageSelect").value; softPlatforms = [];
            
            if (stageName === "Battlefield") {
                mainStage = { x: 180, y: 350, width: 440, height: 25, depth: 35 };
                softPlatforms.push({ x: 230, y: 240, width: 120 }, { x: 450, y: 240, width: 120 });
            } else if (stageName === "FinalDestination") {
                mainStage = { x: 100, y: 360, width: 600, height: 25, depth: 40 };
            } else if (stageName === "ThePit") {
                mainStage = { x: 280, y: 350, width: 240, height: 25, depth: 30 };
            } else if (stageName === "SkyTemple") {
                mainStage = { x: 150, y: 340, width: 500, height: 25, depth: 35 };
                softPlatforms.push({ x: 200, y: 220, width: 100 }, { x: 500, y: 200, width: 100 });
            } else if (stageName === "LavaIsland") {
                mainStage = { x: 120, y: 370, width: 560, height: 25, depth: 40 };
                softPlatforms.push({ x: 250, y: 270, width: 90 }, { x: 450, y: 260, width: 90 });
            } else if (stageName === "IceWasteland") {
                mainStage = { x: 100, y: 360, width: 600, height: 25, depth: 38 };
                softPlatforms.push({ x: 200, y: 240, width: 110 }, { x: 490, y: 250, width: 110 });
            } else if (stageName === "ForestArena") {
                mainStage = { x: 140, y: 345, width: 520, height: 25, depth: 32 };
                softPlatforms.push({ x: 220, y: 235, width: 115 }, { x: 460, y: 225, width: 115 }, { x: 340, y: 150, width: 80 });
            } else if (stageName === "VolcanoRealm") {
                mainStage = { x: 110, y: 365, width: 580, height: 25, depth: 42 };
                softPlatforms.push({ x: 180, y: 260, width: 95 }, { x: 520, y: 270, width: 95 });
            } else if (stageName === "SpaceStation") {
                mainStage = { x: 130, y: 355, width: 540, height: 25, depth: 36 };
                softPlatforms.push({ x: 190, y: 230, width: 105 }, { x: 510, y: 240, width: 105 }, { x: 350, y: 280, width: 100 });
            } else if (stageName === "ShadowRealm") {
                mainStage = { x: 160, y: 340, width: 480, height: 25, depth: 34 };
                softPlatforms.push({ x: 240, y: 245, width: 100 }, { x: 460, y: 230, width: 100 });
            } else {
                mainStage = { x: 280, y: 350, width: 240, height: 25, depth: 30 };
            }

            spelers[0].reset(document.getElementById("p1Char").value, false, 3, matchMode);
            spelers[1].reset(document.getElementById("p2Char").value, document.getElementById("p2Control").value === "CPU", document.getElementById("p2Level").value, matchMode);

            if(document.getElementById("p3Control").value !== "OFF") spelers[2].reset(document.getElementById("p3Char").value, true, document.getElementById("p3Level").value, matchMode); else spelers[2].isActive = false;
            if(document.getElementById("p4Control").value !== "OFF") spelers[3].reset(document.getElementById("p4Char").value, true, document.getElementById("p4Level").value, matchMode); else spelers[3].isActive = false;

            document.getElementById("menu").style.display = "none"; document.getElementById("victoryScreen").style.display = "none";
            canvas.style.display = "block"; document.getElementById("ui").style.display = "flex";
            gameLoop();
        }

        function gameLoop() {
            if (gameState !== "PLAYING") return;
            
            if (isPaused) {
                // Still render when paused, but don't update
                drawCurrentState();
                requestAnimationFrame(gameLoop);
                return;
            }

            handleInput(); updateCPUs(); spelers.forEach(p => p.update()); checkRingOuts();

            drawCurrentState();
            requestAnimationFrame(gameLoop);
        }
        
        function drawCurrentState() {

            let levendeSpelers = spelers.filter(s => s.isActive);
            if (levendeSpelers.length > 0) {
                cameraOffset = ((levendeSpelers.reduce((sum, s) => sum + s.x, 0) / levendeSpelers.length) - canvas.width / 2) * 0.8;
            }

            ctx.save();
            if (shakeTimer > 0) { ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity); shakeTimer--; }

            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height); skyGrad.addColorStop(0, "#060610"); skyGrad.addColorStop(1, "#1c1830");
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stage-specific visuals
            if (matchMode !== undefined) {
                let stageName = document.getElementById("stageSelect").value;
                if (stageName === "LavaIsland") {
                    ctx.fillStyle = "rgba(255, 100, 0, 0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < 5; i++) {
                        ctx.fillStyle = `rgba(255, ${100 + Math.random()*100}, 0, 0.1)`;
                        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 50, 50);
                    }
                } else if (stageName === "IceWasteland") {
                    ctx.fillStyle = "rgba(100, 200, 255, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#e0f7ff"; 
                    for (let i = 0; i < 8; i++) {
                        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 30, 30);
                    }
                } else if (stageName === "ForestArena") {
                    ctx.fillStyle = "#0a2e0a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "rgba(34, 139, 34, 0.3)";
                    for (let i = 0; i < 10; i++) {
                        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 40, 40);
                    }
                } else if (stageName === "VolcanoRealm") {
                    ctx.fillStyle = "rgba(139, 35, 35, 0.2)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#ff4500";
                    for (let i = 0; i < 6; i++) {
                        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 60, 20);
                    }
                } else if (stageName === "SpaceStation") {
                    ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#ffffff";
                    for (let i = 0; i < 12; i++) {
                        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 4, 4);
                    }
                } else if (stageName === "SkyTemple") {
                    let skyGrad2 = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    skyGrad2.addColorStop(0, "#87ceeb"); skyGrad2.addColorStop(1, "#e0f6ff");
                    ctx.fillStyle = skyGrad2; ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (stageName === "ShadowRealm") {
                    ctx.fillStyle = "rgba(75, 0, 130, 0.3)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#9370db";
                    for (let i = 0; i < 8; i++) {
                        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 35, 35);
                    }
                }
            }

            spelers.forEach(p => p.drawShadow());
            let sx = mainStage.x - cameraOffset * 0.3;
            ctx.fillStyle = "#2c2c3e"; ctx.fillRect(sx, mainStage.y, mainStage.width, mainStage.height);
            ctx.fillStyle = "#ffaa00"; ctx.fillRect(sx, mainStage.y, mainStage.width, 3);

            softPlatforms.forEach(p => { 
                let px = p.x - cameraOffset * 0.3; ctx.fillStyle = "rgba(60,60,90,0.8)"; ctx.fillRect(px, p.y, p.width, 6); 
            });

            handleContinuousHits(); spelers.forEach(p => p.draw()); updateProjectiles();

            lasers.forEach(l => { 
                ctx.save();
                if (l.type === "plasma") { ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff"; ctx.fillStyle = "rgba(0, 255, 255, 0.4)"; ctx.fillRect(l.x - cameraOffset*0.3, l.y, l.width, l.height); }
                else if (l.type === "lightning") { ctx.shadowBlur = 20; ctx.shadowColor = "yellow"; ctx.fillStyle = "white"; ctx.fillRect(l.x - cameraOffset*0.3, l.y, l.width, l.height); }
                else if (l.type === "gravity") { ctx.fillStyle = "rgba(191, 85, 236, 0.2)"; ctx.fillRect(l.x - cameraOffset*0.3, l.y, l.width, l.height); }
                else if (l.type === "explosion") { ctx.fillStyle = "rgba(255, 69, 0, 0.5)"; ctx.fillRect(l.x - cameraOffset*0.3, l.y, l.width, l.height); }
                else if (l.type === "sonic") { ctx.strokeStyle = "#ff007f"; ctx.lineWidth = 4; ctx.strokeRect(l.x - cameraOffset*0.3, l.y, l.width, l.height); }
                ctx.restore();
            });

            for (let i = blastEffects.length - 1; i >= 0; i--) {
                let b = blastEffects[i]; ctx.save(); ctx.shadowBlur = 25; ctx.shadowColor = b.color;
                ctx.fillStyle = "white"; ctx.fillRect(b.x, b.y, b.width, b.height); ctx.restore();
                b.timer--; if (b.timer <= 0) blastEffects.splice(i, 1);
            }

            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fillRect(p.x, p.y, p.size, p.size);
                if (p.alpha <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0; ctx.restore();

             spelers.forEach((p, idx) => {
                let uibox = document.getElementById(`ui-p${idx+1}`);
                if (p.isActive) {
                    uibox.style.display = "block"; uibox.style.borderColor = p.color;
                    uibox.innerHTML = `${p.name} (${p.type}): ${Math.floor(p.percentage)}% <div class="stocks">${"⭐".repeat(p.stocks)}</div>`;
                } else { uibox.innerHTML = `${p.name}: K.O.`; uibox.style.borderColor = "#333"; }
            });
        }

        // Pause menu event listeners
        document.getElementById("pauseResumeBtn").addEventListener("click", () => {
            isPaused = false;
            document.getElementById("pauseScreen").style.display = "none";
        });
        
        document.getElementById("pauseExitBtn").addEventListener("click", () => {
            isPaused = false;
            gameState = "MENU";
            document.getElementById("pauseScreen").style.display = "none";
            canvas.style.display = "none";
            document.getElementById("ui").style.display = "none";
            document.getElementById("menu").style.display = "flex";
        });
        
        // Pause with ESC key
        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && gameState === "PLAYING") {
                isPaused = !isPaused;
                document.getElementById("pauseScreen").style.display = isPaused ? "flex" : "none";
            }
        });

        document.getElementById("btnStartGame").addEventListener("click", startScherm);
        document.getElementById("btnBackToMenu").addEventListener("click", () => {
            gameState = "MENU"; document.getElementById("victoryScreen").style.display = "none";
            canvas.style.display = "none"; document.getElementById("ui").style.display = "none";
            document.getElementById("menu").style.display = "flex";
        });
    });
    </script>
</body>
</html>
