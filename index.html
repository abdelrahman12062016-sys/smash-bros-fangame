<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smash Bros - Uitgebreid</title>
    <style>
        body {
            margin: 0; background: #111; color: white;
            font-family: Arial, sans-serif; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #menu {
            position: absolute; background: rgba(0,0,0,0.9);
            width: 800px; height: 500px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #fff; z-index: 10;
        }
        .btn {
            background: #ff4500; color: white; border: none;
            padding: 15px 30px; margin: 10px; font-size: 18px;
            cursor: pointer; font-weight: bold; border-radius: 5px;
        }
        .btn:hover { background: #ff6347; }
        input { padding: 10px; font-size: 16px; text-align: center; }
        canvas { background: #222; border: 4px solid #fff; display: none; }
        #ui { display: none; justify-content: space-around; width: 800px; margin-top: 10px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>SUPER SMASH BROWSER</h1>
        <button class="btn" onclick="startCPUGame()">Play vs CPU</button>
        <hr style="width: 50%; margin: 20px 0;">
        <input type="text" id="roomCode" placeholder="Voer Room Code in">
        <button class="btn" onclick="createOnlineRoom()">Create/Join Room</button>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="ui">
        <div id="p1-ui">Speler 1 (Sword): 0%</div>
        <div id="p2-ui">CPU (Brawler): 0%</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
