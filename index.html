<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Smash Browser - Overdrive Edition</title>
    <style>
        body {
            margin: 0; background: #05050d; color: white;
            font-family: 'Segoe UI', Arial, sans-serif; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #menu, #victoryScreen {
            position: absolute; background: rgba(10, 10, 20, 0.98);
            width: 850px; height: 530px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #ff9900; z-index: 10;
            box-shadow: 0 0 40px rgba(255, 153, 0, 0.3);
            border-radius: 12px; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        #victoryScreen { display: none; border-color: #00ffcc; box-shadow: 0 0 40px rgba(0, 255, 204, 0.4); }
        .btn {
            background: linear-gradient(135deg, #ff9900, #ff4500); color: white; border: none;
            padding: 10px 20px; margin: 5px; font-size: 16px;
            cursor: pointer; font-weight: bold; border-radius: 6px;
            width: 260px; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .btn:hover { transform: scale(1.03); filter: brightness(1.2); }
        .btn-victory { background: linear-gradient(135deg, #00ffcc, #0099ff); }
        .config-panel { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .p-box {
            background: #131324; border: 2px solid #2a2a40; padding: 8px; border-radius: 8px; text-align: center; width: 180px; box-sizing: border-box;
        }
        select {
            padding: 4px; font-size: 13px; margin-top: 4px; background: #222; color: white; border: 1px solid #555;
            border-radius: 4px; cursor: pointer; width: 100%; box-sizing: border-box;
        }
        canvas { background: #000; border: 4px solid #222; border-radius: 8px; display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        #ui { display: none; justify-content: space-between; width: 800px; margin-top: 10px; }
        .p-ui-box { padding: 6px 12px; border-radius: 6px; background: rgba(0,0,0,0.6); width: 180px; text-align: center; font-size: 16px; font-weight: bold; border-bottom: 4px solid #fff; }
        .stocks { color: #ffaa00; font-size: 14px; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 30px; margin: 0 0 5px 0; color: #ff9900; text-shadow: 0 0 15px rgba(255,153,0,0.4);">SUPER SMASH BROWSER</h1>
        <p style="color: #555577; margin: 0 0 15px 0; font-weight: bold; font-size: 12px;">FIRE FISTS & CYBER PLASMA BEAMS ACTIVE</p>
        
        <div style="margin-bottom: 15px; background: #131324; padding: 10px; border-radius: 8px; border: 1px solid #2a2a40;">
            <label><b>Spelmodus:</b> </label>
            <select id="matchMode" style="width: 150px; display: inline-block; margin: 0 10px;">
                <option value="FFA">Free For All (Iedereen tegen iedereen)</option>
                <option value="2v2">Teams 2v2 (P1+P3 vs P2+P4)</option>
            </select>
            <label><b>Stage:</b> </label>
            <select id="stageSelect" style="width: 150px; display: inline-block; margin: 0;">
                <option value="Battlefield">Battlefield</option>
                <option value="FinalDestination">Final Destination</option>
                <option value="ThePit">The Pit</option>
            </select>
        </div>

        <div class="config-panel">
            <div class="p-box" style="border-top: 4px solid #ff4444;">
                <h4 style="margin:2px 0;">Speler 1 (Jij)</h4>
                <select id="p1Char"><option value="Brawler">Brawler 🥊</option><option value="SwordFighter">SwordFighter ⚔️</option><option value="Gunner">Gunner 🔫</option></select>
                <select id="p1Control" disabled><option>Mens (A/D/W/F/G)</option></select>
            </div>
            <div class="p-box" style="border-top: 4px solid #4444ff;">
                <h4 style="margin:2px 0;">Speler 2</h4>
                <select id="p2Char"><option value="Gunner">Gunner 🔫</option><option value="SwordFighter">SwordFighter ⚔️</option><option value="Brawler">Brawler 🥊</option></select>
                <select id="p2Control"><option value="CPU">CPU (Computer)</option><option value="Human">Mens (◄/►/▲/./\/)</option></select>
                <select id="p2Level"><option value="3">AI Level 3</option><option value="1">AI Level 1</option><option value="6">AI Level 6</option><option value="9">AI Level 9 🔥</option></select>
            </div>
            <div class="p-box" style="border-top: 4px solid #22cc22;">
                <h4 style="margin:2px 0;">Speler 3</h4>
                <select id="p3Char"><option value="SwordFighter">SwordFighter ⚔️</option><option value="Brawler">Brawler 🥊</option><option value="Gunner">Gunner 🔫</option></select>
                <select id="p3Control"><option value="CPU">CPU (Computer)</option><option value="OFF">UIT (Geen)</option></select>
                <select id="p3Level"><option value="3">AI Level 3</option><option value="1">AI Level 1</option><option value="6">AI Level 6</option><option value="9">AI Level 9 🔥</option></select>
            </div>
            <div class="p-box" style="border-top: 4px solid #eeee22;">
                <h4 style="margin:2px 0;">Speler 4</h4>
                <select id="p4Char"><option value="Brawler">Brawler 🥊</option><option value="SwordFighter">SwordFighter ⚔️</option><option value="Gunner">Gunner 🔫</option></select>
                <select id="p4Control"><option value="CPU">CPU (Computer)</option><option value="OFF">UIT (Geen)</option></select>
                <select id="p4Level"><option value="3">AI Level 3</option><option value="1">AI Level 1</option><option value="6">AI Level 6</option><option value="9">AI Level 9 🔥</option></select>
            </div>
        </div>

        <button class="btn" id="btnStartGame">VECHT!</button>
    </div>

    <div id="victoryScreen">
        <h1 id="victoryTitle" style="font-size: 40px; color: #00ffcc; text-shadow: 0 0 20px rgba(0,255,204,0.5); margin:0;">VICTORY!</h1>
        <p id="victorySub" style="font-size: 18px; color: #8a8a9e; margin-bottom: 20px;">Match afgelopen!</p>
        <button class="btn btn-victory" id="btnBackToMenu">TERUG NAAR MENU</button>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="ui">
        <div id="ui-p1" class="p-ui-box">P1: 0% <div class="stocks">⭐⭐⭐</div></div>
        <div id="ui-p2" class="p-ui-box">P2: 0% <div class="stocks">⭐⭐⭐</div></div>
        <div id="ui-p3" class="p-ui-box">P3: 0% <div class="stocks">⭐⭐⭐</div></div>
        <div id="ui-p4" class="p-ui-box">P4: 0% <div class="stocks">⭐⭐⭐</div></div>
    </div>

    <script>
    window.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gravity = 0.5;

        let audioCtx = null;
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); let now = audioCtx.currentTime;
            if(type==="jump"){ osc.type="square"; osc.frequency.setValueAtTime(140, now); osc.frequency.exponentialRampToValueAtTime(380, now+0.12); gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, now+0.12); osc.start(now); osc.stop(now+0.12); }
            if(type==="hit"){ osc.type="sawtooth"; osc.frequency.setValueAtTime(110, now); osc.frequency.linearRampToValueAtTime(30, now+0.1); gain.gain.setValueAtTime(0.18, now); gain.gain.linearRampToValueAtTime(0, now+0.1); osc.start(now); osc.stop(now+0.1); }
            if(type==="laser"){ osc.type="triangle"; osc.frequency.setValueAtTime(550, now); osc.frequency.exponentialRampToValueAtTime(180, now+0.18); gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, now+0.18); osc.start(now); osc.stop(now+0.18); }
            if(type==="block"){ osc.type="sine"; osc.frequency.setValueAtTime(280, now); gain.gain.setValueAtTime(0.12, now); gain.gain.linearRampToValueAtTime(0, now+0.08); osc.start(now); osc.stop(now+0.08); }
        }

        let gameState = "MENU", matchMode = "FFA";
        let spelers = [], projectielen = [], lasers = [], particles = [], blastEffects = [];
        let shakeTimer = 0, shakeIntensity = 0, cameraOffset = 0;
        let mainStage = { x: 150, y: 340, width: 500, height: 25, depth: 35 }, softPlatforms = [];

        const classStats = {
            SwordFighter: { weaponColor: "#e0e0e0", damage: 12, range: 55, knockback: 6.2 },
            Brawler:      { weaponColor: "#ff4500", damage: 16, range: 45, knockback: 8.5 },
            Gunner:       { weaponColor: "#00ffff", damage: 5,  range: 0,  knockback: 3.8 }
        };

        const playerMeta = [
            { id: 1, baseColor: "#ff4444", startX: 200, name: "P1" },
            { id: 2, baseColor: "#4444ff", startX: 600, name: "P2" },
            { id: 3, baseColor: "#22cc22", startX: 320, name: "P3" },
            { id: 4, baseColor: "#eeee22", startX: 480, name: "P4" }
        ];

        class Player {
            constructor(meta, controls) {
                this.id = meta.id; this.startX = meta.startX; this.startY = 180;
                this.x = this.startX; this.y = this.startY; this.name = meta.name;
                this.width = 38; this.height = 56;
                this.type = "Brawler"; this.color = meta.baseColor; this.team = null;
                this.vx = 0; this.vy = 0; this.percentage = 0; this.stocks = 3;
                this.isGrounded = false; this.facing = this.id % 2 === 1 ? 1 : -1;
                this.controls = controls; this.isCPU = true; this.aiLevel = 3; this.isActive = true;
                
                this.attackTimer = 0; this.specialTimer = 0; this.animFrame = 0;
                this.respawnTimer = 0; this.isShielding = false; this.shieldHealth = 40; this.jumpsLeft = 2; this.airDodgeTimer = 0;
            }

            reset(type, isCPU, aiLevel, teamMode) {
                this.x = this.startX; this.y = this.startY; this.vx = 0; this.vy = 0;
                this.percentage = 0; this.stocks = 3; this.isActive = true;
                this.type = type; this.isCPU = isCPU; this.aiLevel = parseInt(aiLevel);
                this.attackTimer = 0; this.specialTimer = 0; this.animFrame = 0;
                this.isShielding = false; this.shieldHealth = 40; this.jumpsLeft = 2; this.airDodgeTimer = 0;
                
                if (teamMode === "2v2") {
                    this.team = (this.id === 1 || this.id === 3) ? "ROOD" : "BLAUW";
                    this.color = this.team === "ROOD" ? (this.id === 1 ? "#ff3333" : "#ff7777") : (this.id === 2 ? "#3333ff" : "#7777ff");
                } else {
                    this.team = null; this.color = playerMeta[this.id-1].baseColor;
                }
            }

            respawn() {
                this.stocks--; if (this.stocks <= 0) { this.isActive = false; return; }
                this.x = this.startX; this.y = 100; this.vx = 0; this.vy = 0;
                this.percentage = 0; this.respawnTimer = 60; this.shieldHealth = 40; this.jumpsLeft = 2;
            }

            update() {
                if (!this.isActive) return;
                if (this.respawnTimer > 0) this.respawnTimer--;
                if (this.airDodgeTimer > 0) this.airDodgeTimer--;

                if (this.airDodgeTimer > 10) { this.vy = 0; return; }

                if (this.isShielding && this.isGrounded) {
                    this.vx *= 0.2; this.shieldHealth -= 0.25;
                    if (this.shieldHealth <= 5) this.isShielding = false;
                } else {
                    if (this.shieldHealth < 40) this.shieldHealth += 0.08;
                }

                this.vy += gravity; this.x += this.vx; this.y += this.vy;
                if (this.vx > 0.1 && !this.isShielding) this.facing = 1;
                if (this.vx < -0.1 && !this.isShielding) this.facing = -1;
                this.vx *= this.isGrounded ? 0.8 : 0.96;

                if (Math.abs(this.vx) > 0.2 && this.isGrounded) this.animFrame += 0.22;
                if (this.isGrounded) this.jumpsLeft = 2;

                if (this.attackTimer > 0) this.attackTimer--;
                if (this.specialTimer > 0) {
                    this.specialTimer--;
                    if (this.type === "SwordFighter" && this.specialTimer > 5) this.vx = this.facing * 4.5;
                    // Brawler laat vuurdeeltjes achter tijdens zijn vuur-wervelwind Special!
                    if (this.type === "Brawler" && this.specialTimer > 0) {
                        createParticles(this.x + this.width/2 - cameraOffset*0.3, this.y + this.height/2, "#ff6600", 2);
                    }
                }

                if (this.x + this.width > mainStage.x && this.x < mainStage.x + mainStage.width &&
                    this.y + this.height <= mainStage.y + 10 && this.y + this.height + this.vy >= mainStage.y) {
                    this.y = mainStage.y - this.height; this.vy = 0; this.isGrounded = true;
                } else { this.isGrounded = false; }

                if (!this.isGrounded && this.vy >= 0) {
                    for (let plat of softPlatforms) {
                        if (this.x + this.width > plat.x && this.x < plat.x + plat.width &&
                            this.y + this.height <= plat.y + 8 && this.y + this.height + this.vy >= plat.y) {
                            this.y = plat.y - this.height; this.vy = 0; this.isGrounded = true; break;
                        }
                    }
                }
            }

            drawShadow() {
                if (!this.isActive || this.respawnTimer % 4 >= 2 || this.airDodgeTimer > 10) return;
                if (this.x + this.width > mainStage.x && this.x < mainStage.x + mainStage.width && this.y <= mainStage.y) {
                    let distance = mainStage.y - (this.y + this.height);
                    let shadowWidth = Math.max(6, this.width - (distance * 0.08));
                    let shadowAlpha = Math.max(0, 0.35 - (distance * 0.002));
                    ctx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`; ctx.beginPath();
                    ctx.ellipse(this.x + this.width/2 - cameraOffset*0.3, mainStage.y, shadowWidth, 4, 0, 0, Math.PI * 2); ctx.fill();
                }
            }

            draw() {
                if (!this.isActive || this.respawnTimer % 4 >= 2) return;
                if (this.airDodgeTimer > 10) ctx.globalAlpha = 0.35;

                let cx = this.x + this.width / 2 - cameraOffset * 0.3;
                let cy = this.y + this.height / 2;

                if (this.isShielding) {
                    ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, this.shieldHealth, 0, Math.PI*2);
                    ctx.fillStyle = this.team === "BLAUW" ? "rgba(50,50,255,0.4)" : "rgba(255,50,50,0.4)";
                    ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1.5; ctx.fill(); ctx.stroke(); ctx.restore();
                }

                ctx.save(); ctx.translate(cx, cy); ctx.scale(this.facing, 1);
                
                let legSwing = Math.sin(this.animFrame) * 11; 
                if (!this.isGrounded) legSwing = 8; 
                ctx.fillStyle = "#11111e"; 
                ctx.fillRect(-11, 14, 6, 14 + legSwing * 0.25); 
                ctx.fillRect(4, 14, 6, 14 - legSwing * 0.25);

                ctx.fillStyle = this.color; ctx.fillRect(-14, -13, 28, 27);
                ctx.fillStyle = "#ffdbac"; ctx.fillRect(-8, -28, 16, 15);
                ctx.fillStyle = "#000"; ctx.fillRect(4, -24, 2, 3);

                if (matchMode === "2v2") {
                    ctx.fillStyle = this.team === "ROOD" ? "red" : "blue";
                    ctx.beginPath(); ctx.moveTo(0, -35); ctx.lineTo(-5, -43); ctx.lineTo(5, -43); ctx.fill();
                }

                let ext = 0; if (this.attackTimer > 0) ext = Math.sin((this.attackTimer/14)*Math.PI)*24;
                
                // WAPENS & GLOEIENDE HANDEN LOGICA
                if (this.type === "Brawler") { 
                    // GROTE GLOEIENDE KICKBOX HANDSCHOENEN
                    ctx.save();
                    ctx.shadowBlur = 10; ctx.shadowColor = "#ff3300";
                    ctx.fillStyle = "#ff2200";
                    // Bokshandschoen vooruit (verlengt bij aanval)
                    ctx.fillRect(6 + ext, -5, 13, 11);
                    ctx.fillStyle = "#ffcc00"; // Gouden details
                    ctx.fillRect(14 + ext, -3, 5, 7);
                    ctx.restore();
                } else if (this.type === "SwordFighter") { 
                    ctx.save(); 
                    ctx.fillStyle = classStats[this.type].weaponColor;
                    if (this.specialTimer > 0) {
                        let spinAngle = (this.specialTimer * 0.4) * Math.PI;
                        ctx.rotate(spinAngle);
                        ctx.fillStyle = "#00ffcc";
                        ctx.fillRect(4, -3, 34, 6);
                        ctx.strokeStyle = "rgba(0, 255, 204, 0.4)";
                        ctx.lineWidth = 4;
                        ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI*2); ctx.stroke();
                    } else {
                        let swingAngle = -Math.PI/4 + (this.attackTimer > 0 ? (ext * 0.05) : 0);
                        ctx.rotate(swingAngle); 
                        ctx.fillRect(4, -2, 28, 4); 
                    }
                    ctx.restore(); 
                } else if (this.type === "Gunner") { 
                    ctx.fillStyle = "#555566"; ctx.fillRect(2, -6, 14, 8); 
                    ctx.fillStyle = "#00ffff"; ctx.fillRect(16, -5, 4, 6); // High-tech loop
                }

                ctx.restore(); ctx.globalAlpha = 1.0;
            }

            jump() {
                if (this.isShielding || !this.isActive) return;
                if (this.isGrounded) { this.vy = -11.5; this.jumpsLeft = 1; playSound("jump"); }
                else if (this.jumpsLeft > 0) { this.vy = -10.5; this.jumpsLeft = 0; playSound("jump"); createParticles(this.x+this.width/2 - cameraOffset*0.3, this.y+this.height, "white", 4); }
            }

            triggerAirDodge(dx) {
                if (this.isGrounded || this.airDodgeTimer > 0 || !this.isActive) return;
                this.airDodgeTimer = 18; this.vx = dx * 7.5; this.vy = -1.5;
            }

            attack() {
                if (this.attackTimer > 0 || this.specialTimer > 0 || this.isShielding || this.airDodgeTimer > 10 || !this.isActive) return;
                this.attackTimer = 14; let stats = classStats[this.type];

                if (this.type === "Gunner") {
                    playSound("laser");
                    projectielen.push({ x: this.facing === 1 ? this.x+this.width+4 : this.x-16, y: this.y+16, vx: this.facing*10, damage: stats.damage, knockback: stats.knockback, owner: this });
                } else {
                    let hx = this.facing === 1 ? this.x + this.width : this.x - stats.range;
                    spelers.forEach(opp => {
                        if (opp === this || !opp.isActive || opp.airDodgeTimer > 10 || (this.team && opp.team === this.team)) return;
                        if (hx < opp.x + opp.width && hx + stats.range > opp.x && this.y < opp.y + opp.height && this.y + this.height > opp.y) {
                            if (opp.isShielding) { opp.shieldHealth -= stats.damage*0.7; playSound("block"); } 
                            else { this.hitOpponent(opp, stats.damage, this.facing * (stats.knockback + (opp.percentage * 0.13))); }
                        }
                    });
                }
            }

            special() {
                if (this.attackTimer > 0 || this.specialTimer > 0 || this.isShielding || this.airDodgeTimer > 10 || !this.isActive) return;
                this.specialTimer = 22;

                if (this.type === "Brawler") {
                    // KICKBOXER VUUR-WERVELWIND OMHOOG!
                    this.vy = -14; this.isGrounded = false; this.vx = this.facing * 2; playSound("jump");
                    triggerShake(4, 10);
                    spelers.forEach(opp => {
                        if (opp === this || !opp.isActive || (this.team && opp.team === this.team)) return;
                        if (Math.abs(this.x - opp.x) < 60 && this.y > opp.y - 40 && this.y < opp.y + opp.height + 40) {
                            if (!opp.isShielding) this.hitOpponent(opp, 15, this.facing * 4.5, -12);
                        }
                    });
                } else if (this.type === "SwordFighter") {
                    playSound("hit");
                } else if (this.type === "Gunner") {
                    // DYNAMISCHE CYBER PLASMA BEAM! (Dikke, flitsende stroom)
                    playSound("laser");
                    triggerShake(6, 12);
                    lasers.push({ 
                        x: this.facing === 1 ? this.x+this.width : 0, 
                        y: this.y+8, 
                        width: this.facing === 1 ? canvas.width : this.x, 
                        height: 24, // Dikker gemaakt
                        timer: 15, 
                        owner: this 
                    });
                }
            }

            hitOpponent(opp, dmg, kx, ky = -3.5 - (opp.percentage * 0.07)) {
                opp.percentage += dmg; playSound("hit");
                opp.vx = kx; opp.vy = ky;
                triggerShake(dmg > 10 ? 8 : 4, 8);
                createParticles(opp.x + opp.width/2 - cameraOffset*0.3, opp.y + opp.height/2, classStats[this.type].weaponColor, 12);
            }
        }

        spelers = [
            new Player(playerMeta[0], { left: "KeyA", right: "KeyD", up: "KeyW", attack: "KeyF", special: "KeyG", shield: "ShiftLeft" }),
            new Player(playerMeta[1], { left: "ArrowLeft", right: "ArrowRight", up: "ArrowUp", attack: "Period", special: "Slash", shield: "ArrowDown" }),
            new Player(playerMeta[2], null),
            new Player(playerMeta[3], null)
        ];

        const keys = {};
        window.addEventListener("keydown", (e) => { initAudio(); keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        function triggerShake(intensity, duration) { shakeTimer = duration; shakeIntensity = intensity; }
        function createParticles(x, y, color, amount) {
            for(let i=0; i<amount; i++) {
                particles.push({ x: x, y: y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, size: Math.random()*3+2, alpha: 1, color: color });
            }
        }

        function handleInput() {
            let p1 = spelers[0];
            if (p1.isActive) {
                p1.isShielding = keys[p1.controls.shield] && p1.isGrounded;
                if (!p1.isShielding && p1.airDodgeTimer <= 10) {
                    if (keys[p1.controls.left]) p1.vx = -4.5;
                    if (keys[p1.controls.right]) p1.vx = 4.5;
                    if (keys[p1.controls.up]) { p1.jump(); keys[p1.controls.up] = false; }
                }
                if (keys[p1.controls.attack]) { p1.attack(); keys[p1.controls.attack] = false; }
                if (keys[p1.controls.special]) { p1.special(); keys[p1.controls.special] = false; }
            }

            let p2 = spelers[1];
            if (p2.isActive && !p2.isCPU) {
                p2.isShielding = keys[p2.controls.shield] && p2.isGrounded;
                if (!p2.isShielding && p2.airDodgeTimer <= 10) {
                    if (keys[p2.controls.left]) p2.vx = -4.5;
                    if (keys[p2.controls.right]) p2.vx = 4.5;
                    if (keys[p2.controls.up]) { p2.jump(); keys[p2.controls.up] = false; }
                }
                if (keys[p2.controls.attack]) { p2.attack(); keys[p2.controls.attack] = false; }
                if (keys[p2.controls.special]) { p2.special(); keys[p2.controls.special] = false; }
            }
        }

        function updateCPUs() {
            spelers.forEach(p => {
                if (!p.isActive || !p.isCPU) return;

                let target = null, minDist = 9999;
                spelers.forEach(opp => {
                    if (opp === p || !opp.isActive || (p.team && opp.team === p.team)) return;
                    let d = Math.abs(p.x - opp.x);
                    if (d < minDist) { minDist = d; target = opp; }
                });

                if (!target) return;
                let reactionChance = p.aiLevel * 0.09;

                if (p.y > mainStage.y + 20 && p.jumpsLeft > 0 && Math.random() < reactionChance) {
                    p.jump(); p.vx = (p.x < canvas.width/2) ? 3.5 : -3.5;
                    return;
                }

                if (p.aiLevel >= 6 && minDist < 70 && target.attackTimer > 10 && Math.random() < (p.aiLevel * 0.05)) {
                    if (p.isGrounded) p.isShielding = true; 
                    else p.triggerAirDodge(p.x > target.x ? 1 : -1);
                    return;
                } else { p.isShielding = false; }

                if (!p.isShielding && p.airDodgeTimer <= 10 && Math.random() < reactionChance) {
                    if (p.x < target.x - 30) p.vx = 2.2 + (p.aiLevel * 0.15);
                    else if (p.x > target.x + 30) p.vx = -(2.2 + (p.aiLevel * 0.15));
                    if (target.y < p.y - 30 && Math.random() < 0.05) p.jump();
                }

                if (minDist < 60 && Math.random() < (p.aiLevel * 0.02)) {
                    if (Math.random() < 0.3) p.special(); else p.attack();
                } else if (p.type === "Gunner" && minDist < 280 && Math.random() < (p.aiLevel * 0.01)) {
                    if (Math.random() < 0.4) p.special(); else p.attack();
                }
            });
        }

        function handleContinuousHits() {
            spelers.forEach(p => {
                if (!p.isActive || p.type !== "SwordFighter" || p.specialTimer <= 0) return;
                spelers.forEach(opp => {
                    if (opp === p || !opp.isActive || opp.airDodgeTimer > 10 || (p.team && opp.team === p.team)) return;
                    if (Math.abs((p.x + p.width/2) - (opp.x + opp.width/2)) < 55 && Math.abs(p.y - opp.y) < 45) {
                        if (opp.isShielding) opp.shieldHealth -= 0.4;
                        else { opp.percentage += 0.5; opp.vx = p.facing * 3; opp.vy = -1.5; }
                    }
                });
            });

            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i]; l.timer--;
                
                // Activeer plasma-deeltjes om de beam heen!
                if (Math.random() < 0.5) {
                    let rx = l.x + Math.random() * l.width;
                    createParticles(rx - cameraOffset*0.3, l.y + Math.random()*l.height, "#00ffff", 1);
                }

                if (l.timer === 8) {
                    spelers.forEach(target => {
                        if (!target.isActive || target === l.owner || (l.owner.team && target.team === l.owner.team)) return;
                        if (target.x + target.width > l.x && target.x < l.x + l.width && target.y + target.height > l.y && target.y < l.y + l.height) {
                            if (target.isShielding) { target.shieldHealth -= 10; }
                            else { l.owner.hitOpponent(target, 12, l.owner.facing * 5.5); }
                        }
                    });
                }
                if (l.timer <= 0) lasers.splice(i, 1);
            }
        }

        function updateProjectiles() {
            for (let i = projectielen.length - 1; i >= 0; i--) {
                let proj = projectielen[i]; proj.x += proj.vx;
                ctx.fillStyle = "cyan"; ctx.fillRect(proj.x - cameraOffset*0.3, proj.y, 14, 5);

                spelers.forEach(target => {
                    if (!target.isActive || target === proj.owner || (proj.owner.team && target.team === proj.owner.team)) return;
                    if (proj.x > target.x && proj.x < target.x + target.width && proj.y > target.y && proj.y < target.y + target.height) {
                        if (target.isShielding) { target.shieldHealth -= 4; playSound("block"); }
                        else { proj.owner.hitOpponent(target, proj.damage, (proj.vx > 0 ? 1 : -1) * proj.knockback); }
                        projectielen.splice(i, 1);
                    }
                });

                if (proj.x < -50 || proj.x > canvas.width + 50) projectielen.splice(i, 1);
            }
        }

        function checkRingOuts() {
            spelers.forEach(p => {
                if (!p.isActive) return;
                
                if (p.y > canvas.height || p.x < 0 || p.x > canvas.width || p.y < -40) {
                    let bx = Math.max(10, Math.min(canvas.width - 50, p.x - cameraOffset*0.3));
                    let isVertical = (p.y > canvas.height || p.y < -40);
                    
                    blastEffects.push({
                        x: isVertical ? bx : (p.x < 0 ? 0 : canvas.width - 40),
                        y: 0,
                        width: isVertical ? 45 : canvas.width,
                        height: isVertical ? canvas.height : 45,
                        color: p.color,
                        timer: 20
                    });

                    createParticles(p.x + p.width/2 - cameraOffset*0.3, Math.max(0, Math.min(canvas.height, p.y)), p.color, 30);
                    triggerShake(12, 18);
                    p.respawn();
                }
            });

            let levendeTeams = new Set();
            let actieveSpelers = spelers.filter(p => p.isActive);

            if (matchMode === "2v2") {
                actieveSpelers.forEach(p => levendeTeams.add(p.team));
                if (levendeTeams.size <= 1) { gameState = "GAMEOVER"; showVictoryScreen(Array.from(levendeTeams)[0]); }
            } else {
                if (actieveSpelers.length <= 1) { gameState = "GAMEOVER"; showVictoryScreen(actieveSpelers[0] ? actieveSpelers[0].name : "Niemand"); }
            }
        }

        function showVictoryScreen(winnaar) {
            document.getElementById("victoryScreen").style.display = "flex";
            let sub = document.getElementById("victorySub");
            sub.innerText = matchMode === "2v2" ? `Team ${winnaar} wint de strijd!` : `${winnaar} rekent iedereen af!`;
        }

        function startScherm() {
            matchMode = document.getElementById("matchMode").value;
            gameState = "PLAYING";
            blastEffects = [];

            let stageName = document.getElementById("stageSelect").value; softPlatforms = [];
            if (stageName === "Battlefield") {
                mainStage = { x: 180, y: 350, width: 440, height: 25, depth: 35 }; softPlatforms.push({ x: 230, y: 240, width: 120 }, { x: 450, y: 240, width: 120 });
            } else if (stageName === "FinalDestination") {
                mainStage = { x: 100, y: 360, width: 600, height: 25, depth: 40 };
            } else { mainStage = { x: 280, y: 350, width: 240, height: 25, depth: 30 }; }

            spelers[0].reset(document.getElementById("p1Char").value, false, 3, matchMode);
            
            let p2Cpu = document.getElementById("p2Control").value === "CPU";
            spelers[1].reset(document.getElementById("p2Char").value, p2Cpu, document.getElementById("p2Level").value, matchMode);

            let p3Actief = document.getElementById("p3Control").value;
            if(p3Actief !== "OFF") { spelers[2].reset(document.getElementById("p3Char").value, true, document.getElementById("p3Level").value, matchMode); } else { spelers[2].isActive = false; }

            let p4Actief = document.getElementById("p4Control").value;
            if(p4Actief !== "OFF") { spelers[3].reset(document.getElementById("p4Char").value, true, document.getElementById("p4Level").value, matchMode); } else { spelers[3].isActive = false; }

            document.getElementById("menu").style.display = "none";
            document.getElementById("victoryScreen").style.display = "none";
            canvas.style.display = "block"; document.getElementById("ui").style.display = "flex";
            
            gameLoop();
        }

        function gameLoop() {
            if (gameState !== "PLAYING") return;

            handleInput(); updateCPUs();
            spelers.forEach(p => p.update());
            checkRingOuts();

            let levendeSpelers = spelers.filter(s => s.isActive);
            if (levendeSpelers.length > 0) {
                let mX = levendeSpelers.reduce((sum, s) => sum + s.x, 0) / levendeSpelers.length;
                cameraOffset = (mX - canvas.width / 2) * 0.8;
            }

            ctx.save();
            if (shakeTimer > 0) { ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity); shakeTimer--; }

            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, "#060610"); skyGrad.addColorStop(0.5, "#111124"); skyGrad.addColorStop(1, "#1c1830");
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0d0d1a"; ctx.fillRect(40 - cameraOffset * 0.1, 180, 150, 320); ctx.fillRect(630 - cameraOffset * 0.1, 150, 160, 350);
            ctx.fillStyle = "#141426"; ctx.fillRect(170 - cameraOffset * 0.2, 230, 180, 270); ctx.fillRect(420 - cameraOffset * 0.2, 200, 200, 300);

            spelers.forEach(p => p.drawShadow());

            let sx = mainStage.x - cameraOffset * 0.3;
            ctx.fillStyle = "#2c2c3e"; ctx.fillRect(sx, mainStage.y, mainStage.width, mainStage.height);
            ctx.fillStyle = "#ffaa00"; ctx.fillRect(sx, mainStage.y, mainStage.width, 3);

            ctx.fillStyle = "#1e1e2b"; ctx.beginPath(); 
            ctx.moveTo(sx, mainStage.y + mainStage.height);
            ctx.lineTo(sx + 20, mainStage.y + mainStage.height + mainStage.depth);
            ctx.lineTo(sx + mainStage.width - 20, mainStage.y + mainStage.height + mainStage.depth);
            ctx.lineTo(sx + mainStage.width, mainStage.y + mainStage.height); 
            ctx.closePath(); ctx.fill();

            softPlatforms.forEach(p => { 
                let px = p.x - cameraOffset * 0.3;
                ctx.fillStyle = "rgba(60,60,90,0.8)"; ctx.fillRect(px, p.y, p.width, 6); 
                ctx.fillStyle = "#00ffcc"; ctx.fillRect(px, p.y, p.width, 1.5);
            });

            handleContinuousHits()
            spelers.forEach(p => p.draw());
            updateProjectiles();

            // RENDERING VAN CYBER PLASMA BEAMS
            lasers.forEach(l => { 
                ctx.save();
                ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
                // Kern van de laser
                ctx.fillStyle = "white"; 
                ctx.fillRect(l.x - cameraOffset*0.3, l.y + 4, l.width, l.height - 8); 
                // Buitenste plasma gloed
                ctx.fillStyle = "rgba(0, 255, 255, 0.4)"; 
                ctx.fillRect(l.x - cameraOffset*0.3, l.y, l.width, l.height); 
                ctx.restore();
            });

            for (let i = blastEffects.length - 1; i >= 0; i--) {
                let b = blastEffects[i];
                ctx.save();
                ctx.shadowBlur = 25; ctx.shadowColor = b.color;
                ctx.fillStyle = "white"; ctx.fillRect(b.x, b.y, b.width, b.height);
                ctx.fillStyle = b.color; ctx.globalAlpha = 0.4;
                ctx.fillRect(b.x - 8, b.y, b.width + 16, b.height);
                ctx.restore();
                
                b.timer--;
                if (b.timer <= 0) blastEffects.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;

            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fillRect(p.x, p.y, p.size, p.size);
                if (p.alpha <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0; ctx.restore();

            spelers.forEach((p, idx) => {
                let uibox = document.getElementById(`ui-p${idx+1}`);
                if (p.isActive) {
                    uibox.style.display = "block"; uibox.style.borderColor = p.color;
                    uibox.innerHTML = `${p.name} (${p.type}): ${Math.floor(p.percentage)}% <div class="stocks">${"⭐".repeat(p.stocks)}</div>`;
                } else { uibox.innerHTML = `${p.name}: K.O.`; uibox.style.borderColor = "#333"; }
            });

            requestAnimationFrame(gameLoop);
        }

        document.getElementById("btnStartGame").addEventListener("click", startScherm);
        document.getElementById("btnBackToMenu").addEventListener("click", () => {
            gameState = "MENU"; document.getElementById("victoryScreen").style.display = "none";
            canvas.style.display = "none"; document.getElementById("ui").style.display = "none";
            document.getElementById("menu").style.display = "flex";
        });
    });
    </script>
</body>
</html>
