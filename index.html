<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Smash Browser - Werkend Prototype</title>
    <style>
        body {
            margin: 0; background: #111; color: white;
            font-family: Arial, sans-serif; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #menu {
            position: absolute; background: rgba(20, 20, 20, 0.95);
            width: 800px; height: 500px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #fff; z-index: 10;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .btn {
            background: #ff4500; color: white; border: none;
            padding: 15px 30px; margin: 10px; font-size: 18px;
            cursor: pointer; font-weight: bold; border-radius: 5px;
            width: 300px; transition: 0.2s;
        }
        .btn:hover { background: #ff6347; transform: scale(1.05); }
        canvas { background: #222; border: 4px solid #fff; display: none; }
        #ui { display: none; justify-content: space-around; width: 800px; margin-top: 10px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 42px; margin-bottom: 30px; letter-spacing: 2px;">SUPER SMASH BROWSER</h1>
        <button class="btn" id="btnLocal">2 SPELERS (LOKAAL)</button>
        <button class="btn" id="btnCPU">SPELEN VS CPU</button>
        <p style="color: #aaa; margin-top: 20px;">P1: A-D (Lopen), W (Springen), F (Aanvallen)</p>
        <p style="color: #aaa;">P2: Pijltjes (Lopen), Omhoog (Springen), Punt/Period . (Aanvallen)</p>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="ui">
        <div id="p1-ui">Speler 1: 0%</div>
        <div id="p2-ui">Speler 2: 0%</div>
    </div>

    <script>
    window.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gravity = 0.5;

        let gameState = "MENU";
        let isCPUGame = false;
        let projectielen = [];

        const stage = { x: 150, y: 350, width: 500, height: 40 };

        class Player {
            constructor(x, y, color, type, controls) {
                this.x = x; this.y = y;
                this.width = 40; this.height = 60;
                this.color = color; this.type = type;
                this.vx = 0; this.vy = 0;
                this.percentage = 0;
                this.isGrounded = false;
                this.controls = controls;
                this.facing = 1; 
            }

            update() {
                this.vy += gravity;
                this.x += this.vx;
                this.y += this.vy;

                if (this.vx > 0.1) this.facing = 1;
                if (this.vx < -0.1) this.facing = -1;

                this.vx *= this.isGrounded ? 0.8 : 0.95;

                // Stage Collision
                if (this.x + this.width > stage.x && this.x < stage.x + stage.width &&
                    this.y + this.height <= stage.y + 10 && this.y + this.height + this.vy >= stage.y) {
                    this.y = stage.y - this.height; this.vy = 0; this.isGrounded = true;
                } else { this.isGrounded = false; }

                // Blast zones (Doodgaan)
                if (this.y > canvas.height || this.x < 0 || this.x > canvas.width) {
                    this.x = canvas.width / 2; this.y = 100; this.vx = 0; this.vy = 0; this.percentage = 0;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Oog/Wapen richting
                ctx.fillStyle = "white";
                ctx.fillRect(this.facing === 1 ? this.x + this.width - 8 : this.x + 3, this.y + 15, 5, 5);
            }

            jump() { if (this.isGrounded) this.vy = -12; }

            attack(opponent) {
                // Simpele hitbox check direct voor de speler
                let hitzoneX = this.facing === 1 ? this.x + this.width : this.x - 30;
                if (hitzoneX < opponent.x + opponent.width && hitzoneX + 30 > opponent.x &&
                    this.y < opponent.y + opponent.height && this.y + this.height > opponent.y) {
                    
                    opponent.percentage += 12;
                    let knockback = 4 + (opponent.percentage * 0.12);
                    opponent.vx = this.facing * knockback;
                    opponent.vy = -3 - (opponent.percentage * 0.08);
                }
            }
        }

        // Spelers initialiseren
        const p1 = new Player(250, 200, "#ff3333", "SwordFighter", { left: "KeyA", right: "KeyD", up: "KeyW", attack: "KeyF" });
        const p2 = new Player(500, 200, "#3333ff", "Brawler", { left: "ArrowLeft", right: "ArrowRight", up: "ArrowUp", attack: "Period" });

        // Toetsenbord input registreren
        const keys = {};
        window.addEventListener("keydown", (e) => { keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        function handleInput() {
            // Speler 1 (A, D, W, F)
            if (keys[p1.controls.left]) p1.vx = -5;
            if (keys[p1.controls.right]) p1.vx = 5;
            if (keys[p1.controls.up]) p1.jump();
            if (keys[p1.controls.attack]) { p1.attack(p2); keys[p1.controls.attack] = false; }

            // Speler 2 (Alleen besturen als het GEEN CPU game is)
            if (!isCPUGame) {
                if (keys[p2.controls.left]) p2.vx = -5;
                if (keys[p2.controls.right]) p2.vx = 5;
                if (keys[p2.controls.up]) p2.jump();
                if (keys[p2.controls.attack]) { p2.attack(p1); keys[p2.controls.attack] = false; }
            }
        }

        function updateCPU() {
            if (!isCPUGame) return;

            // Loop simpelweg naar P1 toe
            if (p2.x < p1.x - 30) p2.vx = 2.5;
            else if (p2.x > p1.x + 30) p2.vx = -2.5;

            // Spring willekeurig als P1 hoger is
            if (p1.y < p2.y - 40 && Math.random() < 0.03) p2.jump();

            // Val aan als de CPU dichtbij genoeg staat
            if (Math.abs(p2.x - p1.x) < 50 && Math.random() < 0.08) {
                p2.attack(p1);
            }
        }

        function startScherm(vsCPU) {
            isCPUGame = vsCPU;
            gameState = "PLAYING";
            
            // Schakel UI elementen om via DOM
            document.getElementById("menu").style.display = "none";
            canvas.style.display = "block";
            document.getElementById("ui").style.display = "flex";
            
            // Start de loop pas na de klik
            gameLoop();
        }

        function gameLoop() {
            if (gameState !== "PLAYING") return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Input en AI berekenen
            handleInput();
            updateCPU();

            // Physics updaten
            p1.update();
            p2.update();

            // Teken de Harde Grond (Stage)
            ctx.fillStyle = "#666";
            ctx.fillRect(stage.x, stage.y, stage.width, stage.height);

            // Teken Spelers
            p1.draw();
            p2.draw();

            // Schade-UI bijwerken
            document.getElementById("p1-ui").innerText = `Speler 1: ${p1.percentage}%`;
            document.getElementById("p2-ui").innerText = `${isCPUGame ? 'CPU' : 'Speler 2'}: ${p2.percentage}%`;

            requestAnimationFrame(gameLoop);
        }

        // Event listeners direct koppelen zodra de DOM geladen is
        document.getElementById("btnLocal").addEventListener("click", () => startScherm(false));
        document.getElementById("btnCPU").addEventListener("click", () => startScherm(true));
    });
    </script>
</body>
</html>
